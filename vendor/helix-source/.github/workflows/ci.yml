name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  HELIX_HOME: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "GitHub Actions CI"

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run helix-test
        run: bash cli/helix-test

      - name: Run bats
        run: bats cli/tests/*.bats

      - name: Run helix-verify-all
        run: bash cli/helix-verify-all

      - name: Install dev requirements
        if: ${{ hashFiles('requirements-dev.txt') != '' }}
        run: python3 -m pip install --quiet -r requirements-dev.txt

      - name: Run pytest
        if: ${{ hashFiles('cli/lib/tests/**') != '' }}
        run: python3 -m pytest cli/lib/tests/ -v

      # GAP-034: drift-check を PR で変更された D-API/D-CONTRACT/D-DB ファイルに対して実行
      - name: Detect changed design files
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          # base と head の差分から D-API/D-CONTRACT/D-DB ファイルを検出
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | grep -E '^(D-API|D-CONTRACT|D-DB|docs/D-API|docs/D-CONTRACT|docs/D-DB)/' || true)
          if [[ -n "$changed_files" ]]; then
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$changed_files" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run drift-check on changed design files
        if: github.event_name == 'pull_request' && steps.changed.outputs.has_changes == 'true'
        run: |
          echo "=== Drift Check ==="
          echo "${{ steps.changed.outputs.files }}" | while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            echo ""
            echo "--- $file ---"
            bash cli/helix-drift-check "$file" || true
          done
