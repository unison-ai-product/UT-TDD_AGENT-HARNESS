# matrix.yaml — 成果物対照表（Deliverable Matrix）
# helix_template_version: 3
# helix matrix add-feature <name> --drive <type> でフィーチャーを追加
#
# 手動で追加する場合の例:
# features:
#   user-auth:
#     drive: be
#     scope: feature
#     risk_flags: [auth]
#     ui: true
#     docs_root: docs/features/user-auth
#     src_root: src/features/user-auth
#     requires:
#       L1: [D-REQ-F, D-REQ-NF, D-ACC]
#       L2: [D-ARCH, D-ADR, D-THREAT]
#       ...

project:
  size: "L"
  default_drive: be
  roots:
    docs_root: docs
    src_root: src
  ruleset_version: "1.0"

features: {}

waivers: []
