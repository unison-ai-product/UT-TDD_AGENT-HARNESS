schema_version: 1
fixture_kind: golden_fixture
status: draft_design_spike
drive: fe
description: "FE drive reference fixture for V-model semantic pairs."

metadata:
  phase: "V2 Phase 2"
  source_phase: "Phase A audit"
  implementation_status: "draft_only"
  spine_ref: docs/v2/B-design/vmodel-semantics-spine.yaml
  constraints:
    cli_implementation: false
    db_migration: false
    config_placement: false
    promotion_for_fe: mock_to_implementation
    requires_functional_freeze_for_fe: true
    fe_test_kinds:
      - snapshot
      - visual_regression
      - playwright
      - axe_a11y
    owner_role_mapping:
      planning: tl
      requirement: tl
      architecture: tl
      detailed: pg
      functional: tl

drives:
  fe:
    description: "Frontend/mock-driven first drive."
    source_refs:
      - docs/v2/A-audit/fe-weakness-analysis.md
      - docs/v2/A-audit/audit-summary.md
      - docs/v2/L1-REQUIREMENTS.md
    layers:
      planning:
        design:
          artifacts:
            - information_architecture
            - wireframe_lo_fi
            - drive_decision
            - phase_strategy
          review_unit: journey_map
          review_axes: [vertical, horizontal]
          detectors:
            - axis-08-plan-integrity
            - axis-14-orchestration-integrity
            - axis-19-state-transition-drift
          expected_skills:
            - design-doc
            - visual-design
            - mock-driven-development
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix size --drive fe"
            - "helix gate G0.5 --pair-check planning --drive fe"
        test:
          test_level: operational
          artifacts:
            - wire_review_checklist
            - mockup_handoff_record
            - pipeline_scorecard
          baseline_policy: manual_only
          detectors:
            - axis-11-regression
            - axis-14-orchestration-integrity
            - axis-19-state-transition-drift
          expected_skills:
            - verification
            - testing
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
          command_hints:
            - "helix gate G0.5 --pair-check planning --drive fe"
        pair:
          horizontal_rule: conditional
          vertical_from: null
          vertical_to: requirement
          score_weight: 0.10
          promotion: null
          requires_functional_freeze: true
          conditional_rule: "Required once FE work commits to the 5-stage wire/mockup/judgment/implementation/review pipeline."
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md

      requirement:
        design:
          artifacts:
            - user_journey
            - screen_inventory
            - state_events
            - acceptance_criteria
          review_unit: screen_flow
          review_axes: [vertical, horizontal]
          detectors:
            - axis-08-plan-integrity
            - axis-17-a11y-regression
            - axis-19-state-transition-drift
          expected_skills:
            - requirements-handover
            - mock-driven-development
            - visual-design
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive fe"
            - "helix fe state-events-validate --stage requirement"
        test:
          test_level: acceptance
          artifacts:
            - journey_acceptance_matrix
            - screen_inventory_checklist
            - state_event_acceptance_cases
          baseline_policy: golden_fixture
          detectors:
            - axis-09-test-quality
            - axis-17-a11y-regression
            - axis-19-state-transition-drift
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive fe"
            - "helix fe playwright-run --stage requirement"
        pair:
          horizontal_rule: required
          vertical_from: planning
          vertical_to: architecture
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: true
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md

      architecture:
        design:
          artifacts:
            - mock_html
            - design_tokens
            - state_events
            - wireframe_hi_fi
          review_unit: approved_mock
          review_axes: [vertical, horizontal]
          detectors:
            - axis-15-mock-promotion
            - axis-16-design-token-drift
            - axis-19-state-transition-drift
          expected_skills:
            - mock-driven-development
            - design-doc
            - visual-design
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive fe"
            - "helix fe state-events-validate --stage architecture"
            - "helix fe visual-diff --baseline mock_frozen"
        test:
          test_level: system_integration
          artifacts:
            - mock_promotion_audit
            - visual_regression_plan
            - design_token_baseline
            - state_transition_system_scenarios
          baseline_policy: regression_corpus
          detectors:
            - axis-15-mock-promotion
            - axis-18-visual-regression
            - axis-19-state-transition-drift
          expected_skills:
            - testing
            - verification
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive fe"
            - "helix fe visual-diff --baseline mock_frozen"
            - "helix fe playwright-run --stage architecture"
        pair:
          horizontal_rule: required
          vertical_from: requirement
          vertical_to: detailed
          score_weight: 0.25
          promotion:
            from_layer: architecture
            from_artifact_kind: mock
            to_artifact_kind: component_impl
            link_kind: derives_from
            append_only: true
            g2_evidence_preserved: true
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          lifecycle_overrides:
            architecture_status: mock_frozen
            functional_status: promoted
            evidence_preservation: g2_append_only
            debt_resolution_gates:
              - G4: MOCK-HARDCODE
              - G4: MOCK-CODE-LEAK
              - G6: MOCK-DERIVED-CONTRACT
          requires_functional_freeze: true
          conditional_rule: "Activation begins once G2 freezes the mock; later component_impl rows append promoted evidence without mutating mock_frozen records."

      detailed:
        design:
          artifacts:
            - component_props
            - props_contract
            - a11y_requirement
            - screen_transition
          review_unit: component_surface
          review_axes: [vertical, horizontal]
          detectors:
            - axis-06-naming-confusion
            - axis-16-design-token-drift
            - axis-17-a11y-regression
            - axis-19-state-transition-drift
          expected_skills:
            - design-doc
            - mock-driven-development
            - security
          owner_role: pg
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive fe"
            - "helix fe state-events-validate --stage detailed"
        test:
          test_level: integration
          artifacts:
            - props_contract_integration_tests
            - a11y_scenario_matrix
            - playwright_state_transition_suite
            - token_drift_regression_set
          baseline_policy: regression_corpus
          detectors:
            - axis-09-test-quality
            - axis-17-a11y-regression
            - axis-19-state-transition-drift
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive fe"
            - "helix fe a11y-check --stage detailed"
            - "helix fe playwright-run --stage detailed"
        pair:
          horizontal_rule: required
          vertical_from: architecture
          vertical_to: functional
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: true
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md

      functional:
        design:
          artifacts:
            - component_impl
            - snapshot_fixture
            - visual_baseline
            - state_transition_trace
          review_unit: component_impl
          review_axes: [vertical, horizontal]
          detectors:
            - axis-15-mock-promotion
            - axis-17-a11y-regression
            - axis-18-visual-regression
            - axis-09-refactor-opportunity
          expected_skills:
            - coding
            - mock-driven-development
            - code-review
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive fe"
            - "helix review --uncommitted"
            - "helix fe visual-diff --stage functional"
            - "helix fe a11y-check --stage functional"
        test:
          test_level: unit
          artifacts:
            - snapshot_fixture
            - visual_baseline
            - playwright_journey_suite
            - axe_a11y_report
          baseline_policy: snapshot
          detectors:
            - axis-15-mock-promotion
            - axis-17-a11y-regression
            - axis-18-visual-regression
            - axis-19-state-transition-drift
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/L1-REQUIREMENTS.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive fe"
            - "helix fe snapshot-update"
            - "helix fe visual-diff"
            - "helix fe playwright-run"
            - "helix fe a11y-check"
          examples:
            - id: example-snapshot-fixture
              test_kind: snapshot
              path: docs/v2/A-audit/fe-weakness-analysis.md
            - id: example-visual-baseline
              test_kind: visual_regression
              path: docs/v2/A-audit/fe-weakness-analysis.md
            - id: example-playwright-journey
              test_kind: playwright
              path: docs/v2/L1-REQUIREMENTS.md
            - id: example-axe-report
              test_kind: axe_a11y
              path: docs/v2/A-audit/fe-weakness-analysis.md
        pair:
          horizontal_rule: required
          vertical_from: detailed
          vertical_to: null
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: true
          source_refs:
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/L1-REQUIREMENTS.md

score:
  formula: "100 - 15*missing_test_design - 10*missing_baseline - 20*failing_baseline"
  layer_weights:
    planning_operational: 0.10
    requirement_acceptance: 0.20
    architecture_system_integration: 0.25
    detailed_integration: 0.20
    functional_unit: 0.25
  chain_break_penalty: true

source_refs:
  - docs/v2/A-audit/audit-summary.md
  - docs/v2/A-audit/fe-weakness-analysis.md
  - docs/v2/L1-REQUIREMENTS.md
  - skills/agent-skills/mock-driven-development/SKILL.md
  - skills/SKILL_MAP.md
