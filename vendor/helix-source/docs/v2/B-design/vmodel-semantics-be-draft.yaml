schema_version: 1
fixture_kind: golden_fixture
status: draft_design_spike
drive: be
description: "BE drive reference fixture for V-model semantic pairs."

metadata:
  phase: "V2 Phase 2"
  source_phase: "Phase A audit"
  implementation_status: "draft_only"
  spine_ref: docs/v2/B-design/vmodel-semantics-spine.yaml
  constraints:
    cli_implementation: false
    db_migration: false
    config_placement: false
    promotion_for_be: null
    requires_functional_freeze_for_be: false

drives:
  be:
    description: "Backend/API/logic first drive."
    source_refs:
      - docs/v2/A-audit/audit-summary.md
      - docs/v2/A-audit/capability-inventory.md
      - docs/v2/A-audit/db-schema-current.md
    layers:
      planning:
        design:
          artifacts:
            - plan_goal
            - drive_decision
            - scope_boundary
            - phase_strategy
          review_unit: plan
          review_axes: [vertical, horizontal]
          detectors:
            - axis-08-plan-integrity
            - axis-14-orchestration-integrity
          expected_skills:
            - design-doc
            - estimation
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/legacy-plans-carry.md
            - docs/v2/A-audit/docs-integrity-audit.md
          command_hints:
            - "helix gate G0.5 --pair-check planning --drive be"
            - "helix gate G11 --pair-check planning --drive be"
          examples:
            - id: example-plan-goal
              path: docs/v2/L1-REQUIREMENTS.md
        test:
          test_level: operational
          artifacts:
            - operational_test_outline
            - runbook_acceptance
            - learning_metric_plan
          baseline_policy: manual_only
          detectors:
            - axis-11-regression
            - axis-14-orchestration-integrity
          expected_skills:
            - verification
            - observability-sre
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/perf-cost-audit.md
            - docs/v2/A-audit/cicd-audit.md
          command_hints:
            - "helix gate G11 --pair-check planning --drive be"
          examples:
            - id: example-operational-baseline
              path: verify/h401-full-flow-integration.sh
        pair:
          horizontal_rule: conditional
          vertical_from: null
          vertical_to: requirement
          score_weight: 0.10
          promotion: null
          requires_functional_freeze: false
          conditional_rule: "Required for production-facing or Run-phase BE work; advisory for draft-only design spikes."
          source_refs:
            - docs/v2/A-audit/accumulated-knowledge.md
            - docs/v2/A-audit/test-coverage-audit.md

      requirement:
        design:
          artifacts:
            - l1_requirements
            - acceptance_criteria
            - api_capability_map
            - risk_constraints
          review_unit: capability
          review_axes: [vertical, horizontal]
          detectors:
            - axis-07-contract-drift
            - axis-08-plan-integrity
            - axis-12-connection-deficiency
          expected_skills:
            - requirements-handover
            - api
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/capability-matrix.md
            - docs/v2/A-audit/security-audit.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive be"
          examples:
            - id: example-acceptance-criteria
              path: docs/v2/L1-REQUIREMENTS.md
        test:
          test_level: acceptance
          artifacts:
            - acceptance_test_design
            - user_visible_scenarios
            - api_acceptance_matrix
          baseline_policy: golden_fixture
          detectors:
            - axis-09-test-quality
            - axis-11-regression
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/docs-integrity-audit.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive be"
          examples:
            - id: example-acceptance-fixture
              path: cli/lib/tests/test_gate_check_generator.py
        pair:
          horizontal_rule: required
          vertical_from: planning
          vertical_to: architecture
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: false
          source_refs:
            - docs/v2/A-audit/accumulated-knowledge.md
            - docs/v2/A-audit/capability-matrix.md

      architecture:
        design:
          artifacts:
            - architecture_decision_record
            - api_overview
            - sequence_diagram
            - component_diagram
          review_unit: api_subsystem
          review_axes: [vertical, horizontal]
          detectors:
            - axis-02-coverage-erosion
            - axis-07-contract-drift
            - axis-10-relation-graph
          expected_skills:
            - design-doc
            - api-contract
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/db-schema-current.md
            - docs/v2/A-audit/hooks-commands-subagents.md
            - docs/v2/A-audit/capability-inventory.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive be"
          examples:
            - id: example-api-overview
              path: docs/example/api-overview.md
        test:
          test_level: system_integration
          artifacts:
            - integration_scenarios
            - system_test_plan
            - contract_test_design
          baseline_policy: regression_corpus
          detectors:
            - axis-09-test-quality
            - axis-11-regression
            - axis-12-connection-deficiency
          expected_skills:
            - testing
            - verification
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/cicd-audit.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive be"
          examples:
            - id: example-system-integration
              path: verify/h401-full-flow-integration.sh
        pair:
          horizontal_rule: required
          vertical_from: requirement
          vertical_to: detailed
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: false
          source_refs:
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/db-schema-current.md

      detailed:
        design:
          artifacts:
            - api_contract
            - service_flow
            - error_contract
            - persistence_boundary
          review_unit: api_endpoint
          review_axes: [vertical, horizontal]
          detectors:
            - axis-06-naming-confusion
            - axis-07-contract-drift
            - axis-12-connection-deficiency
          expected_skills:
            - api-contract
            - db
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/db-schema-current.md
            - docs/v2/A-audit/dependencies-audit.md
            - docs/v2/A-audit/security-audit.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive be"
          examples:
            - id: example-api-contract
              path: docs/features/example/D-API/api-contract.yaml
        test:
          test_level: integration
          artifacts:
            - integration_test_design
            - contract_fixture_set
            - error_path_test_matrix
          baseline_policy: regression_corpus
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
          expected_skills:
            - testing
            - api-contract
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/perf-cost-audit.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive be"
          examples:
            - id: example-contract-registry-test
              path: cli/lib/tests/test_contract_registry.py
        pair:
          horizontal_rule: required
          vertical_from: architecture
          vertical_to: functional
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: false
          source_refs:
            - docs/v2/A-audit/db-schema-current.md
            - docs/v2/A-audit/test-coverage-audit.md

      functional:
        design:
          artifacts:
            - function_contract
            - code_symbol_map
            - edge_case_matrix
            - code_review_plan
          review_unit: function
          review_axes: [vertical, horizontal]
          detectors:
            - axis-01-dead-code-drift
            - axis-02-coverage-erosion
            - axis-09-refactor-opportunity
          expected_skills:
            - coding
            - code-review
          owner_role: tl
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/capability-inventory.md
            - docs/v2/A-audit/security-audit.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive be"
            - "helix review --uncommitted"
          examples:
            - id: example-code-index
              path: cli/lib/tests/test_code_catalog.py
        test:
          test_level: unit
          artifacts:
            - unit_test_design
            - baseline_result
            - coverage_target
            - regression_guard
          baseline_policy: snapshot
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/perf-cost-audit.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive be"
          examples:
            - id: example-vmodel-pair-check
              path: cli/lib/tests/test_design_review_pair_check.py
        pair:
          horizontal_rule: required
          vertical_from: detailed
          vertical_to: null
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: false
          source_refs:
            - docs/plans/PLAN-065-qa-strictness.md
            - docs/v2/A-audit/accumulated-knowledge.md
            - docs/v2/A-audit/test-coverage-audit.md

score:
  formula: "100 - 15*missing_test_design - 10*missing_baseline - 20*failing_baseline"
  layer_weights:
    planning_operational: 0.10
    requirement_acceptance: 0.20
    architecture_system_integration: 0.25
    detailed_integration: 0.20
    functional_unit: 0.25
  chain_break_penalty: true

source_refs:
  - docs/v2/A-audit/accumulated-knowledge.md
