schema_version: 1
status: draft_design_spike

metadata:
  phase: "V2 Phase 2"
  source_phase: "Phase A audit"
  intent: "Freeze the semantic contract shape before CLI or DB implementation."
  implementation_status: "draft_only"

principles:
  db_low_cardinality_axes_only:
    - drive
    - origin_mode
    - evidence_status
    - direction
  semantic_externalization: true
  enum_policy: "Do not encode high-cardinality semantic variants as DB enum values."
  expected_skills_policy: "advisory_only"
  review_axes:
    - vertical
    - horizontal
  chain:
    - contract_entries
    - code_index
    - test_design_entries
    - test_baseline

spine:
  drives:
    allowed: [be, fe, db, fullstack]
    description: "HELIX drive type. Scrum and Reverse are origin modes, not drive values in this spine."
  layers:
    allowed: [planning, requirement, architecture, detailed, functional]
    pair_test_levels:
      planning: operational
      requirement: acceptance
      architecture: system_integration
      detailed: integration
      functional: unit

  node_path: "drives.<drive>.layers.<layer>"
  sibling_contract:
    required_siblings: [design, test, pair]
    additional_siblings: false

  design_required:
    - artifacts
    - review_unit
    - review_axes
    - detectors
  design_optional:
    - expected_skills
    - source_refs
    - owner_role
    - command_hints
    - examples

  test_required:
    - test_level
    - artifacts
    - baseline_policy
    - detectors
  test_optional:
    - expected_skills
    - source_refs
    - owner_role
    - command_hints
    - examples

  pair_required:
    - horizontal_rule
    - vertical_from
    - vertical_to
    - score_weight
    - promotion
  pair_optional:
    - source_refs
    - lifecycle_overrides
    - requires_functional_freeze
    - conditional_rule

  field_types:
    design:
      artifacts: "list[str]"
      review_unit: "str"
      review_axes: "list[str]"
      detectors: "list[str]"
      expected_skills: "list[str]"
      source_refs: "list[str]"
      owner_role: "str"
      command_hints: "list[str]"
      examples: "list[dict]"
    test:
      test_level: "str"
      artifacts: "list[str]"
      baseline_policy: "str"
      detectors: "list[str]"
      expected_skills: "list[str]"
      source_refs: "list[str]"
      owner_role: "str"
      command_hints: "list[str]"
      examples: "list[dict]"
    pair:
      horizontal_rule: "str"
      vertical_from: "str|null"
      vertical_to: "str|null"
      score_weight: "float"
      promotion: "dict|null"
      source_refs: "list[str]"
      lifecycle_overrides: "dict"
      requires_functional_freeze: "bool"
      conditional_rule: "str"

  allowed_values:
    review_axes: [vertical, horizontal]
    owner_role: [tl, se, pg, fe, qa, security, dba, devops, docs, research]
    baseline_policy: [snapshot, regression_corpus, golden_fixture, manual_only]
    horizontal_rule: [required, optional, conditional]
    score_weight:
      min: 0.10
      max: 0.25

baseline_policy_family:
  snapshot_like: [snapshot, regression_corpus]
  fixture_like: [golden_fixture, manual_only]

allowed_detectors:
  - axis-01-dead-code-drift
  - axis-02-coverage-erosion
  - axis-06-naming-confusion
  - axis-07-contract-drift
  - axis-08-plan-integrity
  - axis-09-refactor-opportunity
  - axis-09-test-quality
  - axis-10-relation-graph
  - axis-11-regression
  - axis-12-connection-deficiency
  - axis-12-migration-safety
  - axis-14-orchestration-integrity
  - axis-15-mock-promotion
  - axis-16-design-token-drift
  - axis-17-a11y-regression
  - axis-18-visual-regression
  - axis-19-state-transition-drift

lifecycle:
  origin_mode:
    allowed: [forward, reverse, scrum]
  evidence_status:
    allowed: [observed, inferred, confirmed]
  direction:
    allowed: [forward, reverse]
  reverse_transition:
    observed: [inferred]
    inferred: [confirmed]
    confirmed: []
  scrum_transition:
    proposed: [verified, rejected, pivot]
    verified: [confirmed]
    confirmed: []

promotion_kinds:
  mock_to_implementation:
    from_artifact_kind: mock
    to_artifact_kind: component_impl
    link_kind: derives_from
    append_only: true
    g2_evidence_preserved: true

score:
  formula: "100 - 15*missing_test_design - 10*missing_baseline - 20*failing_baseline"
  layer_weights:
    planning_operational: 0.10
    requirement_acceptance: 0.20
    architecture_system_integration: 0.25
    detailed_integration: 0.20
    functional_unit: 0.25
  chain_break_penalty: true

validation:
  json_schema_style:
    type: object
    required: [schema_version, drives]
    properties:
      schema_version:
        const: 1
      drives:
        type: object
        required: [be, fe, db, fullstack]
        additionalProperties: false
        propertyNames:
          enum: [be, fe, db, fullstack]
      layers:
        type: object
        required: [planning, requirement, architecture, detailed, functional]
        additionalProperties: false
  rules:
    - id: required-design-fields
      required: "drives.<drive>.layers.<layer>.design.*"
      fields: [artifacts, review_unit, review_axes, detectors]
    - id: required-test-fields
      required: "drives.<drive>.layers.<layer>.test.*"
      fields: [test_level, artifacts, baseline_policy, detectors]
    - id: required-pair-fields
      required: "drives.<drive>.layers.<layer>.pair.*"
      fields: [horizontal_rule, vertical_from, vertical_to, score_weight, promotion]
    - id: layer-name-check
      cross_check: "pair.vertical_from and pair.vertical_to are null or one of spine.layers.allowed"
    - id: pair-test-level-check
      cross_check: "test.test_level equals spine.layers.pair_test_levels[<layer>]"
    - id: promotion-append-only-check
      cross_check: "when pair.promotion is not null, pair.promotion.append_only must be true"
    - id: expected-skills-advisory-check
      cross_check: "expected_skills must not be used as a fail-close condition"
    - id: review-axis-check
      cross_check: "design.review_axes contains only vertical and horizontal"
    - id: score-weight-check
      cross_check: "pair.score_weight is between 0.10 and 0.25 inclusive"
    - id: chain-presence-check
      cross_check: "score evaluation follows contract_entries -> code_index -> test_design_entries -> test_baseline"
