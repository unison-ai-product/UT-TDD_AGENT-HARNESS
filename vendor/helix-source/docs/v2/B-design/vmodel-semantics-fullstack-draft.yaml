schema_version: 1
fixture_kind: golden_fixture
status: draft_design_spike
drive: fullstack
description: "Fullstack twin-track reference fixture for V-model semantic pairs."

metadata:
  phase: "V2 Phase 2"
  source_phase: "Phase A audit"
  implementation_status: "draft_only"
  spine_ref: docs/v2/B-design/vmodel-semantics-spine.yaml
  constraints:
    cli_implementation: false
    db_migration: false
    config_placement: false
    twin_track: true
    phase_a_parallel: true
    phase_b_l45_integration: true
    contract_freeze_required: true
    promotion_for_fullstack: mock_to_implementation
    requires_functional_freeze_for_fullstack: true
  pipelines:
    be:
      design: tl
      implementation: se
      test: qa
    fe:
      wire: tl
      mockup: tl
      judgment: pm
      implementation: fe
      review: tl
    integration:
      contract_freeze: tl
      l45_validation: qa

drives:
  fullstack:
    description: "Backend + frontend + contract tracks advance in parallel and merge at L4.5."
    source_refs:
      - docs/v2/A-audit/audit-summary.md
      - docs/v2/A-audit/fe-weakness-analysis.md
      - docs/v2/L1-REQUIREMENTS.md
      - docs/commands/twin.md
    layers:
      planning:
        design:
          artifacts:
            - plan_goal
            - drive_decision
            - twin_track_strategy
            - contract_sync_policy
          review_unit: plan
          review_axes: [vertical, horizontal]
          detectors:
            - axis-08-plan-integrity
            - axis-12-connection-deficiency
            - axis-14-orchestration-integrity
          expected_skills:
            - design-doc
            - estimation
            - mock-driven-development
          owner_role: tl
          tracks: [be, fe, contract, shared]
          track_specific:
            be:
              artifacts: [api_capability_map, be_phase_a_outline]
              detectors: [axis-08-plan-integrity, axis-12-connection-deficiency]
            fe:
              artifacts: [wire_outline, mockup_outline]
              detectors: [axis-12-connection-deficiency, axis-14-orchestration-integrity]
            contract:
              artifacts: [contract_sync_checkpoint, freeze_readiness]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            shared:
              artifacts: [phase_strategy, risk_constraints]
              detectors: [axis-08-plan-integrity, axis-14-orchestration-integrity]
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/v2/A-audit/audit-summary.md
            - docs/commands/twin.md
          command_hints:
            - "helix gate G0.5 --pair-check planning --drive fullstack"
            - "helix sprint status"
          examples:
            - id: example-plan-goal
              path: docs/v2/L1-REQUIREMENTS.md
        test:
          test_level: operational
          artifacts:
            - operational_test_outline
            - runbook_acceptance
            - phase_transition_checklist
          baseline_policy: manual_only
          detectors:
            - axis-11-regression
            - axis-14-orchestration-integrity
          expected_skills:
            - verification
            - observability-sre
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/design/D-STATE-SPEC.md
          command_hints:
            - "helix gate G11 --pair-check planning --drive fullstack"
          examples:
            - id: example-operational-baseline
              path: verify/h401-full-flow-integration.sh
        pair:
          horizontal_rule: conditional
          vertical_from: null
          vertical_to: requirement
          score_weight: 0.10
          promotion: null
          requires_functional_freeze: true
          conditional_rule: "Fullstack planning is fail-close when be/fe/contract/shared do not agree on Phase A/B entry criteria."
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/v2/A-audit/accumulated-knowledge.md

      requirement:
        design:
          artifacts:
            - l1_requirements
            - acceptance_criteria
            - api_capability_map
            - state_event_scope
          review_unit: capability
          review_axes: [vertical, horizontal]
          detectors:
            - axis-07-contract-drift
            - axis-08-plan-integrity
            - axis-12-connection-deficiency
          expected_skills:
            - requirements-handover
            - api
            - mock-driven-development
          owner_role: tl
          tracks: [be, fe, contract, shared]
          track_specific:
            be:
              review_unit: capability
              artifacts: [api_capability_map, domain_boundary]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            fe:
              review_unit: screen_flow
              artifacts: [wireframes, state_event_scope]
              detectors: [axis-12-connection-deficiency, axis-19-state-transition-drift]
            contract:
              artifacts: [consumer_journey_map, contract_risk_map]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            shared:
              artifacts: [acceptance_criteria, risk_constraints]
              detectors: [axis-08-plan-integrity, axis-14-orchestration-integrity]
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/fe-weakness-analysis.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive fullstack"
          examples:
            - id: example-acceptance-criteria
              path: docs/v2/L1-REQUIREMENTS.md
        test:
          test_level: acceptance
          artifacts:
            - acceptance_test_design
            - user_visible_scenarios
            - cross_track_acceptance_matrix
          baseline_policy: golden_fixture
          detectors:
            - axis-09-test-quality
            - axis-11-regression
            - axis-12-connection-deficiency
          expected_skills:
            - testing
            - quality-lv5
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/docs-integrity-audit.md
          command_hints:
            - "helix gate G1 --pair-check requirement --drive fullstack"
          examples:
            - id: example-acceptance-fixture
              path: cli/lib/tests/test_gate_check_generator.py
        pair:
          horizontal_rule: required
          vertical_from: planning
          vertical_to: architecture
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: true
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/v2/A-audit/capability-matrix.md

      architecture:
        design:
          artifacts:
            - architecture_decision_record
            - api_overview
            - state_events
            - d_contract_overview
          review_unit: feature_slice
          review_axes: [vertical, horizontal]
          detectors:
            - axis-07-contract-drift
            - axis-10-relation-graph
            - axis-12-connection-deficiency
            - axis-14-orchestration-integrity
          expected_skills:
            - design-doc
            - api-contract
            - mock-driven-development
          owner_role: tl
          tracks: [be, fe, contract, shared]
          track_specific:
            be:
              review_unit: api_subsystem
              artifacts: [service_boundary, sequence_diagram]
              detectors: [axis-07-contract-drift, axis-10-relation-graph]
            fe:
              artifacts: [mock_html, state_events, screen_transition_map]
              detectors: [axis-15-mock-promotion, axis-18-visual-regression, axis-19-state-transition-drift]
            contract:
              artifacts: [d_contract, api_contract, contract_freeze_record]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            shared:
              review_unit: feature_slice
              artifacts: [component_diagram, integration_boundary, phase_b_entry_criteria]
              detectors: [axis-10-relation-graph, axis-14-orchestration-integrity]
          source_refs:
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/fe-weakness-analysis.md
            - docs/design/D-STATE-SPEC.md
            - docs/commands/twin.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive fullstack"
          examples:
            - id: example-state-sync
              path: docs/design/D-STATE-SPEC.md
        test:
          test_level: system_integration
          artifacts:
            - integration_scenarios
            - contract_test_design
            - visual_regression_plan
            - l45_phase_b_plan
          baseline_policy: regression_corpus
          detectors:
            - axis-09-test-quality
            - axis-11-regression
            - axis-12-connection-deficiency
            - axis-18-visual-regression
          expected_skills:
            - testing
            - verification
            - mock-driven-development
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/cicd-audit.md
          command_hints:
            - "helix gate G2 --pair-check architecture --drive fullstack"
          examples:
            - id: example-system-integration
              path: verify/h401-full-flow-integration.sh
          pair:
            horizontal_rule: required
            vertical_from: requirement
            vertical_to: detailed
            score_weight: 0.25
            promotion:
              from_layer: architecture
              from_artifact_kind: mock
              to_artifact_kind: component_impl
              link_kind: derives_from
              append_only: true
              g2_evidence_preserved: true
            requires_functional_freeze: true
            lifecycle_overrides:
              phase_a_tracks: [be, fe, contract]
              phase_b_join: l4.5
            conditional_rule: "D-CONTRACT and state-events must freeze together; be/fe split without contract freeze is a P1 risk."
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/v2/A-audit/accumulated-knowledge.md
            - skills/agent-skills/mock-driven-development/SKILL.md

      detailed:
        design:
          artifacts:
            - api_contract
            - d_contract
            - state_boundary
            - persistence_boundary
          review_unit: feature_contract
          review_axes: [vertical, horizontal]
          detectors:
            - axis-06-naming-confusion
            - axis-07-contract-drift
            - axis-12-connection-deficiency
            - axis-19-state-transition-drift
          expected_skills:
            - api-contract
            - db
            - mock-driven-development
          owner_role: tl
          tracks: [be, fe, contract, shared]
          track_specific:
            be:
              artifacts: [api_contract, service_flow, error_contract]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            fe:
              artifacts: [component_props_contract, client_state_model, data_fetch_contract]
              detectors: [axis-17-a11y-regression, axis-19-state-transition-drift]
            contract:
              artifacts: [d_contract, contract_fixture_set, consumer_provider_mapping]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            shared:
              artifacts: [state_boundary, persistence_boundary, phase_b_sequence]
              detectors: [axis-10-relation-graph, axis-14-orchestration-integrity]
          source_refs:
            - docs/v2/A-audit/dependencies-audit.md
            - docs/v2/A-audit/security-audit.md
            - docs/design/L3-schedule-wbs.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive fullstack"
            - "helix gate G3 --subgate functional_freeze --drive fullstack"
          examples:
            - id: example-api-contract
              path: docs/features/example/D-API/api-contract.yaml
        test:
          test_level: integration
          artifacts:
            - integration_test_design
            - contract_fixture_set       # root fixture family for contracts
            - api_fixture_set            # extends: contract_fixture_set
            - ui_contract_fixture_set    # extends: contract_fixture_set
            - a11y_scenario_matrix
          baseline_policy: regression_corpus
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
            - axis-17-a11y-regression
          expected_skills:
            - testing
            - api-contract
            - verification
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/perf-cost-audit.md
          command_hints:
            - "helix gate G3 --pair-check detailed --drive fullstack"
          examples:
            - id: example-contract-registry-test
              path: cli/lib/tests/test_contract_registry.py
        pair:
          horizontal_rule: required
          vertical_from: architecture
          vertical_to: functional
          score_weight: 0.20
          promotion: null
          requires_functional_freeze: true
          conditional_rule: "Phase A closes only after be/fe/contract detailed designs and integration tests are all paired."
          source_refs:
            - docs/v2/L1-REQUIREMENTS.md
            - docs/design/D-STATE-SPEC.md

      functional:
        design:
          artifacts:
            - function_contract
            - code_symbol_map
            - component_impl_map
            - l45_integration_readiness
          review_unit: feature_unit
          review_axes: [vertical, horizontal]
          detectors:
            - axis-01-dead-code-drift
            - axis-02-coverage-erosion
            - axis-09-refactor-opportunity
            - axis-15-mock-promotion
          expected_skills:
            - coding
            - code-review
            - mock-driven-development
          owner_role: tl
          tracks: [be, fe, contract, shared]
          track_specific:
            be:
              artifacts: [function_contract, api_handler_map]
              detectors: [axis-01-dead-code-drift, axis-02-coverage-erosion]
            fe:
              artifacts: [component_impl_map, visual_token_binding, runtime_state_guards]
              detectors: [axis-15-mock-promotion, axis-18-visual-regression, axis-19-state-transition-drift]
            contract:
              artifacts: [e2e_contract_matrix, contract_ci_gate]
              detectors: [axis-07-contract-drift, axis-12-connection-deficiency]
            shared:
              artifacts: [l45_integration_readiness, release_review_plan]
              detectors: [axis-09-refactor-opportunity, axis-14-orchestration-integrity]
          source_refs:
            - docs/v2/A-audit/accumulated-knowledge.md
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/commands/twin.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive fullstack"
            - "helix review --uncommitted"
          examples:
            - id: example-vmodel-pair-check
              path: cli/lib/tests/test_design_review_pair_check.py
        test:
          test_level: unit
          artifacts:
            - api_unit_test_design
            - snapshot_test_design
            - visual_regression_suite
            - a11y_test_suite
            - e2e_contract_exit_suite
          baseline_policy: snapshot
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
            - axis-17-a11y-regression
            - axis-18-visual-regression
          expected_skills:
            - testing
            - quality-lv5
            - verification
          owner_role: qa
          source_refs:
            - docs/v2/A-audit/test-coverage-audit.md
            - docs/v2/A-audit/perf-cost-audit.md
            - docs/design/D-STATE-SPEC.md
          command_hints:
            - "helix gate G4 --pair-check functional --drive fullstack"
          examples:
            - id: example-baseline
              path: cli/lib/tests/test_design_review_pair_check.py
        pair:
          horizontal_rule: required
          vertical_from: detailed
          vertical_to: null
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: true
          lifecycle_overrides:
            phase_b_sequence: [.b1, .b2, .b3]
            expected_tests: [api_unit, integration, system_integration, snapshot, visual_regression, a11y, e2e, contract_test]
          conditional_rule: "G4 stays closed until be .5, fe .5, and L4.5 e2e/contract_test readiness all pass together."
          source_refs:
            - docs/design/D-STATE-SPEC.md
            - docs/v2/A-audit/audit-summary.md
            - docs/v2/A-audit/accumulated-knowledge.md

score:
  formula: "100 - 15*missing_test_design - 10*missing_baseline - 20*failing_baseline"
  layer_weights:
    planning_operational: 0.10
    requirement_acceptance: 0.20
    architecture_system_integration: 0.25
    detailed_integration: 0.20
    functional_unit: 0.25
  chain_break_penalty: true

source_refs:
  - docs/commands/twin.md
  - docs/design/D-STATE-SPEC.md
  - docs/v2/A-audit/accumulated-knowledge.md
  - docs/v2/A-audit/audit-summary.md
  - docs/v2/A-audit/capability-matrix.md
  - docs/v2/A-audit/cicd-audit.md
  - docs/v2/A-audit/dependencies-audit.md
  - docs/v2/A-audit/fe-weakness-analysis.md
  - docs/v2/A-audit/security-audit.md
  - docs/v2/A-audit/test-coverage-audit.md
  - docs/v2/B-design/vmodel-semantics-be-draft.yaml
  - docs/v2/B-design/vmodel-semantics-spine.yaml
  - docs/v2/L1-REQUIREMENTS.md
  - skills/agent-skills/mock-driven-development/SKILL.md
