          promotion: null
          requires_functional_freeze: true  # L1 FR-VS03 master: enforce only when size=L and drive in (fe/fullstack/db)
          conditional_rule: Required once FE work commits to the 5-stage wire/mockup/judgment/implementation/review pipeline.
      requirement:
        design:
