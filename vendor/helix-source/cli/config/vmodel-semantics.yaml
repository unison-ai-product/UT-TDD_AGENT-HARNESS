            - screen_inventory_checklist
            - state_event_acceptance_cases
          baseline_policy: golden_fixture
          detectors:
            - axis-09-test-quality
            - axis-17-a11y-regression
            - axis-19-state-transition-drift
        pair:
          horizontal_rule: required
          vertical_from: planning
          vertical_to: architecture
          score_weight: 0.2
          promotion: null
          requires_functional_freeze: true  # L1 FR-VS03 master: enforce only when size=L and drive in (fe/fullstack/db)
      architecture:
        design:
          artifacts:
            - mock_html
            - design_tokens
            - state_events
            - wireframe_hi_fi
          review_unit: approved_mock
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-15-mock-promotion
            - axis-16-design-token-drift
            - axis-19-state-transition-drift
        test:
          test_level: system_integration
          artifacts:
            - mock_promotion_audit
            - visual_regression_plan
            - design_token_baseline
            - state_transition_system_scenarios
          baseline_policy: regression_corpus
