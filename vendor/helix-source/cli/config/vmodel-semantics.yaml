# V-model semantic contract normalized from the Phase 2 spine and drive drafts.
# Reference implementation for docs/v2/L1-REQUIREMENTS.md FR-VS03/05/07.
# If this file conflicts with L1-REQUIREMENTS.md, L1 is the master source of truth.
# Final functional_freeze enforcement comes from L1 FR-VS03:
# `size=L AND drive in (fe/fullstack/db)`. `requires_functional_freeze` below is finer-grained guidance only.
# Cross-drive normalization applied:
# - FE architecture artifact `state-events.md` -> `state_events`
# - fullstack promotion schema -> FE-style canonical append-only shape
schema_version: 1
spine:
  drives:
    allowed:
      - be
      - fe
      - db
      - fullstack
    description: HELIX drive type. Scrum and Reverse are origin modes, not drive values in this spine.
  layers:
    allowed:
      - planning
      - requirement
      - architecture
      - detailed
      - functional
    pair_test_levels:
      planning: operational
      requirement: acceptance
      architecture: system_integration
      detailed: integration
      functional: unit
  design_required:
    - artifacts
    - review_unit
    - review_axes
    - detectors
  test_required:
    - test_level
    - artifacts
    - baseline_policy
    - detectors
  pair_required:
    - horizontal_rule
    - vertical_from
    - vertical_to
    - score_weight
    - promotion
  allowed_values:
    review_axes:
      - vertical
      - horizontal
    owner_role:
      - tl
      - se
      - pg
      - fe
      - qa
      - security
      - dba
      - devops
      - docs
      - research
    baseline_policy:
      - snapshot
      - regression_corpus
      - golden_fixture
      - manual_only
    horizontal_rule:
      - required
      - optional
      - conditional
    score_weight:
      min: 0.1
      max: 0.25
lifecycle:
  origin_mode:
    - forward
    - reverse
    - scrum
  evidence_status:
    - observed
    - inferred
    - confirmed
  direction:
    - forward
    - reverse
  origin_mode_transitions:
    reverse_to_forward:
      trigger: 'RG4 (Gap & Routing) 完了時'
      automatic: true
      notes: 'RG3 (Intent Hypotheses) で PO 承認後の confirmed evidence が前提'
  evidence_status_transitions:
    observed_to_inferred: 'R1/R2 で契約と設計が抽出された時点'
    inferred_to_confirmed: 'R3 PO 承認時のみ'
  functional_freeze_applicability:
    reverse_mode: 'skip (forward 接続前)'
    forward_mode: 'apply (origin_mode=forward 後の sprint)'
promotion_kinds:
  mock_to_implementation:
    from_artifact_kind: mock
    to_artifact_kind: component_impl
    link_kind: derives_from
    append_only: true
    g2_evidence_preserved: true
drives:
  be:
    description: Backend/API/logic first drive.
    layers:
      planning:
        design:
          artifacts:
            - plan_goal
            - drive_decision
            - scope_boundary
            - phase_strategy
          review_unit: plan
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-08-plan-integrity
            - axis-14-orchestration-integrity
        test:
          test_level: operational
          artifacts:
            - operational_test_outline
            - runbook_acceptance
            - learning_metric_plan
          baseline_policy: manual_only
          detectors:
            - axis-11-regression
            - axis-14-orchestration-integrity
        pair:
          horizontal_rule: conditional
          vertical_from: null
          vertical_to: requirement
          score_weight: 0.1
          promotion: null
          requires_functional_freeze: false
          conditional_rule: Required for production-facing or Run-phase BE work; advisory for draft-only design spikes.
      requirement:
        design:
          artifacts:
            - l1_requirements
            - acceptance_criteria
            - api_capability_map
            - risk_constraints
          review_unit: capability
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-07-contract-drift
            - axis-08-plan-integrity
            - axis-12-connection-deficiency
        test:
          test_level: acceptance
          artifacts:
            - acceptance_test_design
            - user_visible_scenarios
            - api_acceptance_matrix
          baseline_policy: golden_fixture
          detectors:
            - axis-09-test-quality
            - axis-11-regression
        pair:
          horizontal_rule: required
          vertical_from: planning
          vertical_to: architecture
          score_weight: 0.2
          promotion: null
          requires_functional_freeze: false
      architecture:
        design:
          artifacts:
            - architecture_decision_record
            - api_overview
            - sequence_diagram
            - component_diagram
          review_unit: api_subsystem
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-02-coverage-erosion
            - axis-07-contract-drift
            - axis-10-relation-graph
        test:
          test_level: system_integration
          artifacts:
            - integration_scenarios
            - system_test_plan
            - contract_test_design
          baseline_policy: regression_corpus
          detectors:
            - axis-09-test-quality
            - axis-11-regression
            - axis-12-connection-deficiency
        pair:
          horizontal_rule: required
          vertical_from: requirement
          vertical_to: detailed
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: false
      detailed:
        design:
          artifacts:
            - api_contract
            - service_flow
            - error_contract
            - persistence_boundary
          review_unit: api_endpoint
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-06-naming-confusion
            - axis-07-contract-drift
            - axis-12-connection-deficiency
        test:
          test_level: integration
          artifacts:
            - integration_test_design
            - contract_fixture_set
            - error_path_test_matrix
          baseline_policy: regression_corpus
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
        pair:
          horizontal_rule: required
          vertical_from: architecture
          vertical_to: functional
          score_weight: 0.2
          promotion: null
          requires_functional_freeze: false
      functional:
        design:
          artifacts:
            - function_contract
            - code_symbol_map
            - edge_case_matrix
            - code_review_plan
          review_unit: function
          review_axes:
            - vertical
            - horizontal
          detectors:
            - axis-01-dead-code-drift
            - axis-02-coverage-erosion
            - axis-09-refactor-opportunity
        test:
          test_level: unit
          artifacts:
            - unit_test_design
            - baseline_result
            - coverage_target
            - regression_guard
          baseline_policy: snapshot
          detectors:
            - axis-02-coverage-erosion
            - axis-09-test-quality
            - axis-11-regression
        pair:
          horizontal_rule: required
          vertical_from: detailed
          vertical_to: null
          score_weight: 0.25
          promotion: null
          requires_functional_freeze: false
  fe:
    description: Frontend/mock-driven first drive.
    layers:
      planning:
        design:
          artifacts:
            - information_architecture
            - wireframe_lo_fi
            - drive_decision
