      - { type: read-code, desc: "ルーティング初期化の特定" }
      - { type: write-doc, desc: "エントリポイント一覧" }

  legacy-scan-db:
    name: "DB スキーマ抽出"
    role: legacy
    estimate: 15
    skill: workflow/reverse-r0
    actions:
      - { type: search-internal, desc: "ORM モデル / migration ファイル検索" }
