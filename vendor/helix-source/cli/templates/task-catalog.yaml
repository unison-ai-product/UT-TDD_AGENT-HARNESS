      - { type: fact-check, desc: "実 DB との突合（接続可能な場合）" }

  legacy-scan-external:
    name: "外部依存抽出"
    role: legacy
    estimate: 15
    skill: workflow/reverse-r0
    actions:
      - { type: search-internal, desc: "HTTP クライアント呼び出し検索（fetch/axios/http）" }
      - { type: search-internal, desc: "環境変数から外部 URL 抽出" }
      - { type: search-internal, desc: "SDK / クライアントライブラリの使用箇所" }
      - { type: write-doc, desc: "外部 API 依存マップ" }
      - { type: fact-check, desc: "外部 API の現在の稼働状況確認" }

  legacy-scan-config:
    name: "設定・環境解析"
    role: legacy
    estimate: 10
    skill: workflow/reverse-r0
    actions:
