      - { type: write-doc, desc: "ディレクトリ構造マップ" }

  legacy-scan-entrypoints:
    name: "エントリポイント特定"
    role: legacy
    estimate: 15
    skill: workflow/reverse-r0
    actions:
      - { type: search-internal, desc: "main / index / app / server ファイルの検索" }
