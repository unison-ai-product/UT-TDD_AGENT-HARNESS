# task-catalog.yaml — HELIX タスクカタログ v2
# タスクオペレーティングシステムの正本
#
# 構造: タスク > アクション（2層）
#   タスク: PM が選んで組み合わせる単位
#   アクション: 実行時の最小作業単位（action-types.yaml 参照）

# ============================================================
# research: 調査系
# ============================================================
research:
  research-library:
    name: "ライブラリ比較調査"
    role: research
    estimate: 30
    skill: workflow/research
    actions:
      - { type: analyze, desc: "要件から比較軸を定義" }
      - { type: search-external, desc: "候補を Web 検索" }
      - { type: read-docs, desc: "各候補の公式ドキュメント確認" }
      - { type: fact-check, desc: "GitHub/npm でメンテ状況・スター・issue 確認" }
      - { type: fact-check, desc: "ライセンス確認" }
      - { type: poc, desc: "有力候補を最小コードで動作確認" }
      - { type: analyze, desc: "比較表作成（メリット/デメリット/推奨）" }
      - { type: fact-check, desc: "結論の根拠が最新か検証" }
      - { type: write-doc, desc: "調査報告書作成" }

  research-prior-art:
    name: "先行事例調査"
    role: research
    estimate: 25
    skill: workflow/research
    actions:
      - { type: analyze, desc: "調査テーマの定義" }
      - { type: search-external, desc: "類似プロジェクト・事例を Web 検索" }
      - { type: read-docs, desc: "事例のアーキテクチャ・技術スタック確認" }
      - { type: fact-check, desc: "事例の成功/失敗要因の裏取り" }
      - { type: analyze, desc: "自プロジェクトへの適用可能性評価" }
      - { type: write-doc, desc: "事例報告書作成" }

  research-feasibility:
    name: "実現可能性調査"
    role: research
    estimate: 30
    skill: workflow/research
    actions:
      - { type: analyze, desc: "技術的問いの明確化" }
      - { type: search-external, desc: "技術的制約・限界の調査" }
      - { type: search-internal, desc: "既存コードベースとの互換性確認" }
      - { type: poc, desc: "最小 PoC で実現性検証" }
      - { type: run-test, desc: "PoC の動作確認" }
      - { type: evaluate-risk, desc: "技術リスク評価" }
      - { type: write-doc, desc: "実現可能性レポート" }

  research-security:
    name: "セキュリティ調査"
    role: research
    estimate: 25
    skill: workflow/research
    actions:
      - { type: search-external, desc: "CVE/脆弱性データベース検索" }
      - { type: read-docs, desc: "セキュリティアドバイザリ確認" }
      - { type: search-internal, desc: "該当ライブラリのバージョン確認" }
      - { type: fact-check, desc: "脆弱性の影響範囲と攻撃条件の裏取り" }
      - { type: evaluate-risk, desc: "リスクレベル判定（Critical/High/Medium/Low）" }
      - { type: write-doc, desc: "セキュリティ調査報告書" }

  research-compliance:
    name: "コンプライアンス調査"
    role: research
    estimate: 20
    skill: workflow/research
    actions:
      - { type: search-external, desc: "ライセンス条文確認" }
      - { type: search-external, desc: "データ保護規制（GDPR/個人情報保護法）確認" }
      - { type: fact-check, desc: "ライセンス互換性チェック" }
      - { type: analyze, desc: "コンプライアンス適合性評価" }
      - { type: human-confirm, desc: "法務確認が必要か判断" }
      - { type: write-doc, desc: "コンプライアンスチェック結果" }

  research-performance:
    name: "パフォーマンス調査"
    role: perf
    estimate: 25
    skill: common/performance
    actions:
      - { type: search-external, desc: "ベンチマーク手法・ツール調査" }
      - { type: read-code, desc: "現行コードのホットパス特定" }
      - { type: run-benchmark, desc: "現状のパフォーマンス計測" }
      - { type: analyze, desc: "ボトルネック分析" }
      - { type: search-external, desc: "最適化手法の調査" }
      - { type: write-doc, desc: "パフォーマンス調査レポート" }

# ============================================================
# design: 設計系
# ============================================================
design:
  design-architecture:
    name: "アーキテクチャ設計"
    role: tl
    estimate: 40
    skill: workflow/design-doc
    actions:
      - { type: read-code, desc: "既存コードベース構造の把握" }
      - { type: analyze, desc: "要件からコンポーネント分割" }
      - { type: search-external, desc: "アーキテクチャパターン調査" }
      - { type: decide, desc: "アーキテクチャパターン選定" }
      - { type: write-doc, desc: "コンポーネント図・データフロー記述" }
      - { type: evaluate-risk, desc: "アーキテクチャリスク評価" }
      - { type: write-doc, desc: "ADR 記録" }

  design-api:
    name: "API エンドポイント設計"
    role: tl
    estimate: 25
    skill: project/api
    actions:
      - { type: analyze, desc: "必要なエンドポイント洗い出し" }
      - { type: search-internal, desc: "既存 API との重複確認" }
      - { type: write-schema, desc: "リクエスト/レスポンス型定義" }
      - { type: write-doc, desc: "エンドポイント一覧表作成" }
      - { type: review-cross-ref, desc: "要件↔API の網羅性確認" }

  design-db:
    name: "DB スキーマ設計"
    role: dba
    estimate: 25
    skill: project/db
    actions:
      - { type: analyze, desc: "エンティティ抽出" }
      - { type: search-internal, desc: "既存テーブルとの関連確認" }
      - { type: write-schema, desc: "テーブル定義・ER 図作成" }
      - { type: analyze, desc: "インデックス設計" }
      - { type: evaluate-risk, desc: "マイグレーションリスク評価" }

  design-ui:
    name: "UI/UX 設計"
    role: tl
    estimate: 30
    skill: project/ui
    actions:
      - { type: analyze, desc: "画面フロー定義" }
      - { type: search-external, desc: "UI パターン・デザインシステム調査" }
      - { type: decide, desc: "配色・タイポグラフィ・レイアウト方針" }
      - { type: write-doc, desc: "コンポーネント構成（Atomic Design）" }
      - { type: write-doc, desc: "レスポンシブ・アクセシビリティ方針" }

  design-security:
    name: "セキュリティ設計"
    role: security
    estimate: 25
    skill: workflow/threat-model
    actions:
      - { type: analyze, desc: "STRIDE モデルで脅威分析" }
      - { type: search-external, desc: "OWASP Top 10 該当項目確認" }
      - { type: decide, desc: "認証・認可・暗号化方式選定" }
      - { type: write-doc, desc: "脅威モデル + 対策方針" }
      - { type: human-confirm, desc: "セキュリティ方針の承認" }

# ============================================================
# contract: 契約定義系
# ============================================================
contract:
  contract-api:
    name: "API コントラクト定義"
    role: tl
    estimate: 25
    skill: workflow/api-contract
    actions:
      - { type: read-code, desc: "API 設計書の確認" }
      - { type: write-contract, desc: "OpenAPI / YAML 契約定義" }
      - { type: write-schema, desc: "リクエスト/レスポンススキーマ" }
      - { type: write-schema, desc: "エラーコード定義" }
      - { type: review-cross-ref, desc: "設計書↔契約の一致確認" }
      - { type: fact-check, desc: "既存 API との互換性確認" }

  contract-type:
    name: "型定義"
    role: se
    estimate: 20
    skill: common/coding
    actions:
      - { type: read-code, desc: "API コントラクトの確認" }
      - { type: write-schema, desc: "TypeScript/Python 型定義生成" }
      - { type: review-cross-ref, desc: "契約↔型の一致確認" }
      - { type: run-lint, desc: "型チェック実行" }

  contract-test-design:
    name: "テスト設計"
    role: qa
    estimate: 20
    skill: common/testing
    actions:
      - { type: analyze, desc: "テスト対象の洗い出し" }
      - { type: analyze, desc: "テストピラミッド配分決定" }
      - { type: write-doc, desc: "テストケース一覧作成" }
      - { type: review-cross-ref, desc: "要件↔テストケースの網羅性確認" }

# ============================================================
# document: ドキュメント系
# ============================================================
document:
  document-adr:
    name: "ADR 作成"
    role: docs
    estimate: 15
    skill: common/documentation
    actions:
      - { type: analyze, desc: "判断のコンテキスト整理" }
      - { type: search-internal, desc: "過去の ADR との関連確認" }
      - { type: write-doc, desc: "ADR 本文（コンテキスト/選択肢/決定/影響）" }
      - { type: fact-check, desc: "選択肢の比較根拠が正確か検証" }

  document-readme:
    name: "README 作成/更新"
    role: docs
    estimate: 15
    skill: common/documentation
    actions:
      - { type: read-code, desc: "プロジェクト構成の確認" }
      - { type: write-doc, desc: "セットアップ手順・使い方記述" }
      - { type: validate-assumption, desc: "手順が実際に動くか検証" }
      - { type: fact-check, desc: "バージョン・依存の記載が最新か" }

  document-api-spec:
    name: "API 仕様書作成"
    role: docs
    estimate: 20
    skill: common/documentation
    actions:
      - { type: read-code, desc: "API コントラクト読解" }
      - { type: write-doc, desc: "エンドポイント仕様記述" }
      - { type: write-doc, desc: "認証・エラー仕様記述" }
      - { type: review-cross-ref, desc: "コントラクト↔仕様書の一致確認" }

  document-setup-guide:
    name: "セットアップガイド作成"
    role: docs
    estimate: 15
    skill: workflow/dev-setup
    actions:
      - { type: read-code, desc: "依存関係・設定ファイル確認" }
      - { type: write-doc, desc: "手順書記述" }
      - { type: validate-assumption, desc: "クリーン環境で手順を実行検証" }

# ============================================================
# mapping: マッピング・依存関係系
# ============================================================
mapping:
  mapping-design-code:
    name: "設計↔実装マッピング"
    role: tl
    estimate: 20
    skill: workflow/dependency-map
    actions:
      - { type: read-code, desc: "設計書の項目一覧抽出" }
      - { type: search-internal, desc: "各項目の実装ファイル特定" }
      - { type: write-doc, desc: "マッピング表作成" }
      - { type: review-cross-ref, desc: "未実装項目の検出" }

  mapping-api-type:
    name: "API↔型マッピング"
    role: tl
    estimate: 15
    skill: workflow/api-contract
    actions:
      - { type: read-code, desc: "API 契約の型定義確認" }
      - { type: search-internal, desc: "実装側の型定義検索" }
      - { type: review-cross-ref, desc: "型一致率チェック" }
      - { type: write-doc, desc: "不一致レポート" }

  mapping-dependency:
    name: "依存関係マップ作成"
    role: tl
    estimate: 20
    skill: workflow/dependency-map
    actions:
      - { type: read-code, desc: "import/require の依存グラフ抽出" }
      - { type: search-external, desc: "外部依存の脆弱性チェック" }
      - { type: fact-check, desc: "ライセンス互換性確認" }
      - { type: write-doc, desc: "依存関係図 + リスク一覧" }

# ============================================================
# review: レビュー系
# ============================================================
review:
  review-code-quality:
    name: "コード品質レビュー"
    role: tl
    estimate: 20
    skill: common/code-review
    actions:
      - { type: review-diff, desc: "変更差分の確認" }
      - { type: review-checklist, desc: "命名規則チェック" }
      - { type: review-checklist, desc: "関数サイズ・引数数チェック" }
      - { type: review-checklist, desc: "型安全性チェック（any 使用等）" }
      - { type: review-adversarial, desc: "エッジケース・境界値の考慮漏れ" }
      - { type: write-doc, desc: "指摘リスト作成" }

  review-security:
    name: "セキュリティレビュー"
    role: security
    estimate: 25
    skill: common/security
    actions:
      - { type: review-checklist, desc: "OWASP Top 10 チェック" }
      - { type: search-internal, desc: "ハードコード秘密情報の検索" }
      - { type: review-checklist, desc: "入力バリデーション確認" }
      - { type: review-checklist, desc: "認証・認可の実装確認" }
      - { type: review-adversarial, desc: "攻撃シナリオの想定" }
      - { type: fact-check, desc: "使用ライブラリの CVE 確認" }
      - { type: write-doc, desc: "脆弱性レポート（Critical/High/Medium/Low）" }

  review-performance:
    name: "パフォーマンスレビュー"
    role: perf
    estimate: 20
    skill: common/performance
    actions:
      - { type: read-code, desc: "ホットパス・ループ・N+1 検出" }
      - { type: review-checklist, desc: "バンドルサイズ・遅延ロード確認" }
      - { type: review-checklist, desc: "DB クエリ最適化確認" }
      - { type: write-doc, desc: "ボトルネック指摘 + 最適化提案" }

  review-accessibility:
    name: "アクセシビリティレビュー"
    role: qa
    estimate: 20
    skill: project/ui
    actions:
      - { type: review-checklist, desc: "WCAG 2.1 AA チェックリスト照合" }
      - { type: search-internal, desc: "aria 属性・alt 属性の確認" }
      - { type: review-checklist, desc: "キーボードナビゲーション確認" }
      - { type: review-checklist, desc: "コントラスト比確認" }
      - { type: write-doc, desc: "違反リスト（Critical/Major/Minor）" }

  review-usability:
    name: "ユーザビリティレビュー"
    role: tl
    estimate: 20
    skill: project/ui
    actions:
      - { type: review-checklist, desc: "ニールセンのヒューリスティック評価" }
      - { type: analyze, desc: "ユーザーフロー分析" }
      - { type: review-adversarial, desc: "初見ユーザー視点での問題発見" }
      - { type: write-doc, desc: "UX 改善提案" }

  review-visual:
    name: "ビジュアルレビュー"
    role: tl
    estimate: 20
    skill: project/ui
    actions:
      - { type: read-code, desc: "デザイン仕様（DESIGNER.md / デザイントークン）確認" }
      - { type: review-checklist, desc: "スクショ目視: デザインカンプとの一致" }
      - { type: review-checklist, desc: "スクショ目視: レスポンシブ (desktop/tablet/mobile)" }
      - { type: review-checklist, desc: "スクショ目視: 配色比率 70-25-5" }
      - { type: review-checklist, desc: "スクショ目視: タイポグラフィ・余白・整列" }
      - { type: review-checklist, desc: "スクショ目視: ダークモード (該当時)" }
      - { type: review-adversarial, desc: "デザイン崩れ・意図しない表示の発見" }
      - { type: write-doc, desc: "ビジュアルレビューレポート（指摘 + スクショ参照）" }
      - { type: human-confirm, desc: "デザイナー/PO による最終承認" }

  review-api-contract:
    name: "API 契約突合レビュー"
    role: tl
    estimate: 15
    skill: workflow/api-contract
    actions:
      - { type: review-cross-ref, desc: "契約↔実装のエンドポイント突合" }
      - { type: review-cross-ref, desc: "リクエスト/レスポンス型の一致確認" }
      - { type: review-checklist, desc: "エラーコードの網羅性確認" }
      - { type: write-doc, desc: "差分レポート" }

  review-design-consistency:
    name: "設計一貫性レビュー"
    role: tl
    estimate: 20
    skill: workflow/adversarial-review
    actions:
      - { type: review-cross-ref, desc: "設計書↔実装の対応確認" }
      - { type: search-internal, desc: "設計に記載のない実装（スコープクリープ）検出" }
      - { type: search-internal, desc: "実装されていない設計項目の検出" }
      - { type: write-doc, desc: "乖離リスト" }

  review-adversarial:
    name: "adversarial レビュー"
    role: tl
    estimate: 25
    skill: workflow/adversarial-review
    actions:
      - { type: review-adversarial, desc: "設計の前提を疑う" }
      - { type: review-adversarial, desc: "障害シナリオの想定" }
      - { type: review-adversarial, desc: "スケーラビリティの限界を突く" }
      - { type: fact-check, desc: "代替案の存在確認" }
      - { type: write-doc, desc: "反証リスト + 改善提案" }

# ============================================================
# implement: 実装系
# ============================================================
implement:
  implement-scaffold:
    name: "スケルトン作成"
    role: pg
    estimate: 15
    skill: common/coding
    actions:
      - { type: read-code, desc: "既存プロジェクト構造の確認" }
      - { type: write-code, desc: "ディレクトリ構造作成" }
      - { type: write-code, desc: "空ファイル + export 定義" }
      - { type: run-lint, desc: "構文チェック" }

  implement-api:
    name: "API エンドポイント実装"
    role: se
    estimate: 35
    skill: project/api
    actions:
      - { type: read-code, desc: "API コントラクト確認" }
      - { type: write-code, desc: "ルーティング定義" }
      - { type: write-code, desc: "バリデーション実装" }
      - { type: write-code, desc: "ハンドラ実装" }
      - { type: write-code, desc: "エラーハンドリング実装" }
      - { type: run-lint, desc: "型チェック + lint" }
      - { type: run-test, desc: "既存テストが壊れていないか確認" }

  implement-db:
    name: "DB マイグレーション実装"
    role: dba
    estimate: 25
    skill: project/db
    actions:
      - { type: read-code, desc: "DB スキーマ設計の確認" }
      - { type: write-code, desc: "マイグレーション up 作成" }
      - { type: write-code, desc: "マイグレーション down 作成" }
      - { type: write-code, desc: "Seed データ作成" }
      - { type: validate-assumption, desc: "マイグレーション実行テスト" }
      - { type: evaluate-risk, desc: "破壊的変更がないか確認" }

  implement-logic:
    name: "ビジネスロジック実装"
    role: se
    estimate: 35
    skill: common/coding
    actions:
      - { type: read-code, desc: "設計書・仕様の確認" }
      - { type: write-code, desc: "コアロジック実装" }
      - { type: write-code, desc: "エラーハンドリング" }
      - { type: run-lint, desc: "型チェック + lint" }
      - { type: run-test, desc: "ユニットテスト実行" }

  implement-auth:
    name: "認証認可実装"
    role: se
    estimate: 30
    skill: common/security
    actions:
      - { type: read-code, desc: "セキュリティ設計の確認" }
      - { type: write-code, desc: "認証ミドルウェア実装" }
      - { type: write-code, desc: "認可ガード実装" }
      - { type: write-config, desc: "シークレット管理設定" }
      - { type: run-test, desc: "認証テスト実行" }
      - { type: human-confirm, desc: "セキュリティ実装の承認" }

  implement-ui-component:
    name: "UI コンポーネント実装"
    role: pg
    estimate: 30
    skill: project/ui
    actions:
      - { type: read-code, desc: "UI 設計・デザイントークン確認" }
      - { type: write-code, desc: "コンポーネント実装" }
      - { type: write-code, desc: "Props / 型定義" }
      - { type: write-code, desc: "Storybook ストーリー" }
      - { type: run-lint, desc: "型チェック + lint" }

  implement-style:
    name: "スタイリング実装"
    role: pg
    estimate: 25
    skill: project/ui
    actions:
      - { type: read-code, desc: "デザイン仕様確認" }
      - { type: write-code, desc: "CSS / Tailwind 実装" }
      - { type: write-code, desc: "レスポンシブ対応" }
      - { type: write-code, desc: "ダークモード対応（該当時）" }
