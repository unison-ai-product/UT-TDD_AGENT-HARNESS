# gate-checks.yaml — ゲートごとの自動チェック定義
# helix_template_version: 3
#
# ⚠ このファイルは後方互換用テンプレートです。
# 新規プロジェクトでは `helix matrix init && helix matrix compile` で
# matrix.yaml から自動生成してください。
#
# プロジェクトルートの .helix/gate-checks.yaml にコピーして使う
# static: シェルコマンド（exit 0 = pass, 非0 = fail）
# ai: helix codex で実行する AI 検証
#   role: helix codex のロール
#   task: プロンプト

G0.5:
  name: "企画突合ゲート"
  static:
    - name: "企画書の存在"
      cmd: "find docs -name 'proposal.*' -o -name 'planning.*' -o -name '企画書.*' -o -path '*/D-REQ-F/*.md' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: 企画書なし'"
      level: advisory
    - name: "要件定義の存在"
      cmd: "find docs -path '*/D-REQ-F/*.md' 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "受入条件の存在"
      cmd: "find docs -path '*/D-ACC/*.md' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: D-ACC なし'"
      level: mandatory
    - name: "要件定義に TODO/TBD 残存なし"
      cmd: "! find docs -path '*/D-REQ-F/*.md' -exec grep -l 'TODO\\|TBD\\|未定\\|要確認' {} + 2>/dev/null | head -1"
      level: mandatory
    - name: "要件の解像度チェック（最低行数）"
      cmd: "for f in $(find docs -path '*/D-REQ-F/*.md' 2>/dev/null); do lines=$(wc -l < \"$f\"); if [ \"$lines\" -lt 10 ]; then echo \"FAIL: $f が $lines 行（最低10行）\"; exit 1; fi; done; echo 'OK'"
      level: mandatory
    - name: "受入条件に測定可能な数値があるか"
      cmd: "find docs -path '*/D-ACC/*.md' 2>/dev/null -exec grep -lE '[0-9]+(ms|秒|%|件|回|MB|GB)' {} + | head -1 | grep -q . || echo 'SKIP: D-ACC なしまたは数値基準なし'"
      level: advisory
    - name: "非機能要件のカテゴリ網羅"
      cmd: "find docs -path '*/D-REQ-NF/*.md' 2>/dev/null -exec grep -lE '可用性|セキュリティ|性能|運用|保守' {} + | head -1 | grep -q . || echo 'SKIP: D-REQ-NF なしまたはカテゴリ不足'"
      level: advisory
    - name: "エラーケースの記載"
      cmd: "find docs -path '*/D-REQ-F/*.md' 2>/dev/null -exec grep -lE 'エラー|異常|失敗|例外|バリデーション' {} + | head -1 | grep -q . || echo 'SKIP: エラーケース記載なし'"
      level: advisory
  ai:
    - role: tl
      task: |
        【TL: 設計視点の企画突合】
        docs/ 配下の企画書と要件定義（D-REQ-F/D-REQ-NF/D-ACC）を比較し:
        1. 企画書の全項目が要件定義に反映されているか（漏れ検出）
        2. 要件の解像度は実装可能なレベルか（曖昧な表現がないか）
        3. 機能間の依存関係と矛盾がないか
        4. 技術的実現可能性に懸念がないか
        結果を verdict: approve/needs-attention で返してください。
    - role: qa
      task: |
        【QA: テスト視点の要件検証】
        docs/ 配下の要件定義（D-REQ-F）と受入条件（D-ACC）を検証:
        1. 全ての機能要件にテスト可能な受入条件があるか
        2. 受入条件に測定可能な基準（数値、閾値）があるか
        3. 正常系だけでなくエラー系・境界値の条件があるか
        4. 非機能要件（D-REQ-NF）のテスト方法が明確か
        結果を verdict: approve/needs-attention で返してください。
    - role: security
      task: |
        【Security: セキュリティ視点の要件検証】
        docs/ 配下の要件定義を検証:
        1. 認証・認可に関する要件が明確か
        2. 個人情報（PII）の取り扱い方針があるか
        3. 入力バリデーションの要件があるか
        4. データの暗号化・保存・削除の方針があるか
        5. OWASP Top 10 に対する考慮があるか
        結果を verdict: approve/needs-attention で返してください。

G2:
  name: "設計凍結ゲート"
  static:
    - name: "設計書 TODO 残存"
      cmd: "! grep -rn 'TODO\\|FIXME\\|TBD\\|未定' docs/design/L2-*.md"
      level: mandatory
    - name: "設計書存在"
      cmd: "ls docs/design/L2-*.md >/dev/null 2>&1"
      level: mandatory
    - name: "AG02 danger-full-access ハードコードなし"
      cmd: "if [ -f .claude/settings.json ] || [ -d scripts ]; then ! grep -RIn 'danger-full-access' .claude/settings.json scripts/ 2>/dev/null | head -1; else echo 'SKIP: settings/scripts なし'; fi"
      level: mandatory
    - name: "PLAN D-shard/reference 最低証跡"
      cmd: "python3 \"$HELIX_HOME/cli/lib/plan_schema.py\" g2-check --project-root ."
      level: mandatory
    - name: "ADR が代替案を含むか"
      cmd: "find docs -path '*/D-ADR/*' -name '*.md' -exec grep -l '代替案\\|alternatives\\|却下' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: ADR なし'"
      level: advisory
    - name: "スコープ境界が明示されているか"
      cmd: "find docs -path '*/D-REQ-F/*' -name '*.md' -exec grep -l 'スコープ外\\|対象外\\|out.of.scope' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: 要件文書なし'"
      level: mandatory
    - name: "要件→機能のトレーサビリティ"
      cmd: "find docs -path '*/L2-*' -exec grep -l 'REQ-F-' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: L2 に REQ-F 参照なし'"
      level: mandatory
    - name: "アーキテクチャ図"
      cmd: "find docs -path '*/L2-*' -exec grep -l 'mermaid\\|構成図' {} + 2>/dev/null | head -1 | grep -q ."
      level: advisory
    - name: "技術スタック選定理由"
      cmd: "find docs -path '*/L2-*' -exec grep -l '選定理由' {} + 2>/dev/null | head -1 | grep -q ."
      level: advisory
    - name: "セキュリティ設計"
      cmd: "find docs -path '*/L2-*' -exec grep -l 'STRIDE\\|脅威\\|セキュリティ' {} + 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "非機能要件言及"
      cmd: "find docs -path '*/L2-*' -exec grep -l '性能\\|可用性\\|SLA' {} + 2>/dev/null | head -1 | grep -q ."
      level: advisory
  ai:
    - role: tl
      task: |
        G2 設計凍結ゲート検証:
        docs/design/L2-*.md を全て読み、以下を検出せよ:
        1. 未定義のAPI・画面・モジュール
        2. 矛盾する設計判断
        3. セキュリティ上の懸念（脅威分析）
    - role: security
      task: |
        G2 脅威分析:
        docs/design/L2-*.md を読み、STRIDE モデルで脅威を分析せよ

G3:
  name: "実装着手ゲート"
  static:
    - name: "API契約存在"
      cmd: "ls docs/design/L3-api-contract.* >/dev/null 2>&1"
      level: mandatory
    - name: "API契約 TODO 残存"
      cmd: "! grep -rn 'TODO\\|FIXME\\|TBD\\|未定' docs/design/L3-*.md docs/design/L3-*.yaml 2>/dev/null"
      level: mandatory
    - name: "API 凍結宣言"
      cmd: "find docs -path '*/D-API/*' -name '*.yaml' -o -path '*/D-API/*' -name '*.md' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: API 契約なし'"
      level: advisory
    - name: "DB スキーマ定義存在（D-DB）"
      cmd: "find docs -path '*/D-DB/*.md' -o -path '*/D-DB/*.yaml' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: D-DB なし'"
      level: advisory
    - name: "DB マイグレーション計画存在（D-MIG-PLAN）"
      cmd: "find docs -path '*/D-MIG-PLAN/*.md' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: D-MIG-PLAN なし'"
      level: advisory
    - name: "テスト設計"
      cmd: "find docs -path '*/L3-*' -exec grep -l 'テスト\\|TC-' {} + 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "機能→API のトレーサビリティ"
      cmd: "find docs -path '*/L3-*' -exec grep -l 'F-[0-9]' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: L3 に F-ID 参照なし'"
      level: mandatory
    - name: "要件→テストのトレーサビリティ"
      cmd: "find docs -path '*/L3-*' -exec grep -l 'TC-[0-9]' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: L3 に TC-ID なし'"
      level: mandatory
    - name: "工程表"
      cmd: "find docs -path '*/L3-*' -exec grep -l '工程表\\|タスク.*見積' {} + 2>/dev/null | head -1 | grep -q ."
      level: advisory
    - name: "エラーハンドリング"
      cmd: "find docs -path '*/L3-*' -exec grep -l 'エラー.*コード\\|Error' {} + 2>/dev/null | head -1 | grep -q ."
      level: mandatory
  ai:
    - role: tl
      task: |
        G3 実装着手ゲート検証:
        L2 設計書と L3 詳細設計/API契約の整合性を確認せよ:
        1. L2 に記載された全 API が L3 で定義されているか
        2. データ型の一貫性
        3. エラーハンドリングの網羅性

G4:
  name: "実装凍結ゲート"
  static:
    - name: "技術負債台帳の存在"
      cmd: "test -f .helix/debt-register.yaml || echo 'SKIP: 負債台帳なし（helix debt add で作成）'"
      level: advisory
    - name: "要件→実装マッピング存在（あれば）"
      cmd: "python3 -c \"import sqlite3,sys; c=sqlite3.connect('.helix/helix.db'); r=c.execute('SELECT COUNT(*) FROM requirements').fetchone()[0]; m=c.execute('SELECT COUNT(*) FROM req_impl_map').fetchone()[0]; print(f'REQ:{r} MAP:{m}'); sys.exit(0 if r==0 or m>=r else 1)\" 2>/dev/null || echo 'SKIP: 要件テーブルなし'"
      level: advisory
    - name: "型チェック"
      cmd: "npx tsc --noEmit 2>&1 | tail -1 | grep -q '0 errors' || npx tsc --noEmit 2>&1 | grep -qv error"
      level: advisory
    - name: "lint"
      cmd: "npx eslint . --quiet 2>&1; test $? -eq 0"
      level: advisory
    - name: "テスト"
      cmd: "npm test 2>&1; test $? -eq 0"
      level: mandatory
    - name: "API エンドポイント整合チェック"
      cmd: "$HELIX_HOME/cli/libexec/helix-gate-api-check"
      level: mandatory
    - name: "テストカバレッジ（あれば）"
      cmd: "if [ -f coverage/coverage-summary.json ]; then python3 -c \"import json; d=json.load(open('coverage/coverage-summary.json')); pct=d.get('total',{}).get('lines',{}).get('pct',0); exit(0 if pct>=70 else 1)\"; elif [ -f .coverage ]; then echo 'coverage exists'; else echo 'SKIP: カバレッジ未計測'; fi"
      level: advisory
    - name: "TODO/FIXME 残存"
      cmd: "! grep -rn 'TODO\\|FIXME' src/ --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx'"
      level: advisory
    - name: "OWASP: SQL インジェクション検出"
      cmd: "! rg -n \"f['\\\"].*SELECT|execute\\(.*\\+|format\\(.*SELECT\" --type py src/ 2>/dev/null | grep -v '#.*noqa' | head -1"
      level: mandatory
    - name: "OWASP: XSS 検出"
      cmd: "! rg -n \"innerHTML|dangerouslySetInnerHTML|v-html\" --type js --type ts src/ 2>/dev/null | head -1"
      level: mandatory
    - name: "秘密情報ハードコード検出"
      cmd: "! rg -n '(?i)(api[_-]?key|secret|token|password|credential)\\s*[=:]\\s*[\\x27\"][^\\x27\\\"]{8,}' --type-not md src/ 2>/dev/null | grep -v '.*\\.example\\.' | head -1"
      level: mandatory
    - name: "AG05 秘密情報混入チェック"
      cmd: "! rg -n '(?i)(bearer |sk-|ghp_|xoxb-|xoxp-|-----BEGIN)' src/ --type-not md 2>/dev/null | head -1"
      level: mandatory
    - name: ".env が git 追跡されていない"
      cmd: "! git ls-files .env .env.* 2>/dev/null | head -1"
      level: mandatory
    # === FE 品質チェック ===
    - name: "モック/ダミー残存チェック"
      cmd: "! rg -n '(?i)(localhost:[0-9]|mock-api|dummy-data|FIXME|TODO.*mock)' src/ --type ts --type js --type tsx --type jsx 2>/dev/null | grep -v '.*\\.test\\.' | grep -v '.*\\.spec\\.' | head -1"
      level: mandatory
    - name: "console.log/debugger 残存チェック"
      cmd: "! rg -n '^\\s*(console\\.(log|debug|warn|error)|debugger)' src/ --type ts --type js --type tsx --type jsx 2>/dev/null | grep -v '.*\\.test\\.' | grep -v '.*\\.spec\\.' | head -1"
      level: mandatory
    - name: "開発用語の UI 露出チェック"
      cmd: "! rg -n '(Exception|NullPointerException|undefined is not|Cannot read prop|Stack trace|Error:.*at )' src/ --type ts --type js --type tsx --type jsx 2>/dev/null | grep -v 'catch\\|throw\\|Error(' | head -1"
      level: mandatory
    - name: "AI っぽい出力チェック"
      cmd: "! rg -n '(もちろんです|お手伝いします|ご質問にお答えします|As an AI|I apologize)' src/ --type ts --type js --type tsx --type jsx 2>/dev/null | head -1"
      level: mandatory
    - name: "ハードコード URL チェック"
      cmd: "! rg -n 'https?://(localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0)' src/ --type ts --type js --type tsx --type jsx 2>/dev/null | grep -v '.*\\.test\\.' | grep -v 'env\\.' | head -1"
      level: mandatory
    - name: "エラーメッセージ安全性"
      cmd: "! rg -n '(err|error)\\.message|err\\.stack|error\\.stack' src/ --type ts --type js 2>/dev/null | grep -v 'catch\\|log\\|logger\\|console' | head -1"
      level: mandatory
    - name: "レスポンスに内部情報漏洩なし"
      cmd: "! rg -n 'stack.*res\\.|res.*stack|res\\.json.*err\\b|res\\.send.*err\\b' src/ --type ts --type js 2>/dev/null | head -1"
      level: mandatory
    - name: "CSS マジックナンバーチェック"
      cmd: "! rg -n 'z-index:\\s*[0-9]{3,}' src/ --type css 2>/dev/null | head -1"
      level: advisory
  ai:
    - role: tl
      task: |
        G4 実装凍結ゲート検証:
        設計文書（docs/design/）と実装（src/）を突合し、以下を検出せよ:
        1. 書いただけで接続されていないコード（未使用 export, 呼ばれていない関数, 未使用コンポーネント）
        2. ハードコード値（マジックナンバー, 埋め込みURL, 埋め込みキー, 埋め込み文字列）
        3. 設計に記載があるが実装されていない機能
        4. 実装されているが設計に記載がない機能（スコープクリープ）
        5. エラーハンドリングの欠落
    - role: security
      task: |
        G4 セキュリティ実装検証:
        src/ を読み、OWASP Top 10 観点で脆弱性を検出せよ

G5:
  name: "デザイン凍結ゲート"
  static:
    - name: "デザイントークン定義"
      cmd: "find docs -path '*/L5-*' -exec grep -l 'トークン\\|token\\|--color\\|--space\\|--font' {} + | head -1 | grep -q ."
      level: mandatory
    - name: "アクセシビリティチェック"
      cmd: "find docs -path '*/L5-*' -exec grep -l 'WCAG\\|アクセシビリティ\\|コントラスト' {} + | head -1 | grep -q ."
      level: mandatory
    - name: "レスポンシブ対応"
      cmd: "find docs -path '*/L5-*' -exec grep -l 'mobile\\|tablet\\|desktop\\|ブレークポイント' {} + | head -1 | grep -q ."
      level: mandatory
    - name: "UI目視確認 全件 approved"
      cmd: "! grep -rl '判定: pending' .helix/visual-checks/*.md 2>/dev/null || test $(ls .helix/visual-checks/*.md 2>/dev/null | wc -l) -eq 0"
      level: advisory
    - name: "スクリーンショット必須3枚"
      cmd: "for d in .helix/visual-checks/*-screenshots/; do [ -d \"$d\" ] || continue; for f in desktop.png tablet.png mobile.png; do [ -f \"$d/$f\" ] || exit 1; done; done"
      level: advisory
  ai:
    - role: fe
      task: |
        G5 デザイン品質検証:
        L5 仕様書（docs/design/L5-visual-design.md）と L2 設計のデザイン方針が一貫しているか、
        デザイントークンが実装に適用されているか確認。
        具体的に:
        1. 未適用のデザイン指示
        2. デザイントークンを使わずハードコードされたスタイル値
        3. レスポンシブ対応の欠落
        4. アクセシビリティの欠落
        5. L2 設計書のデザイン方針との一貫性

G6:
  name: "RC判定ゲート"
  static:
    - name: "全テスト通過"
      cmd: "npm test 2>&1; test $? -eq 0"
      level: mandatory
    - name: "E2E テスト"
      cmd: "npx playwright test 2>&1; test $? -eq 0"
      level: mandatory
    - name: "Flaky テスト検出（3回実行で不安定なし）"
      cmd: "echo 'SKIP: Flaky テスト検出は手動実行推奨（helix test を3回実行して比較）'"
      level: advisory
    - name: "テスト十分性の判断記録"
      cmd: "echo 'advisory: テストカバレッジと mutation score を確認してください'"
      level: advisory
  ai:
    - role: qa
      task: |
        G6 RC判定ゲート検証:
        テストカバレッジとクリティカルパスの網羅性を検証せよ
    - role: security
      task: |
        G6 最終セキュリティチェック:
        RC としてリリース可能か、脆弱性スキャン結果を評価せよ

G6.5:
  name: "セキュリティ監査ゲート"
  static:
    - name: "G6.5 smoke"
      cmd: "echo 'SKIP: G6.5 smoke (追加実装時は要確認)'"
      level: advisory
  ai:
    - role: security
      task: |
        G6.5 監査:
        1. Security/脅威モデル更新の有無を確認せよ
        2. L6.5 チェックに基づくリスク是正アクションをレビューせよ

G6.7:
  name: "運用準備ゲート"
  static:
    - name: "G6.7 smoke"
      cmd: "echo 'SKIP: G6.7 smoke (追加実装時は要確認)'"
      level: advisory
  ai:
    - role: devops
      task: |
        G6.7 運用準備:
        1. cron / scheduler / 運用ログ / リソース管理 / 開発者向け運用画面の準備を確認せよ
        2. 運用移行時の欠落点がないことを評価せよ

G6.9:
  name: "Visual Productionゲート"
  static:
    - name: "G6.9 smoke"
      cmd: "echo 'SKIP: G6.9 smoke (追加実装時は要確認)'"
      level: advisory
  ai:
    - role: fe
      task: |
        G6.9 Visual Production:
        1. 配色・画像・アニメーションの最終実装反映を確認せよ
        2. 受け入れ品質と UX ガイダンスとの乖離を確認せよ

G7:
  name: "安定性ゲート"
  static:
    - name: "Docker ビルド"
      cmd: "docker build -t test . 2>&1; test $? -eq 0"
      level: advisory
    - name: "ロールバック手順の存在"
      cmd: "find docs -path '*/D-DEPLOY/*' -name '*.md' -exec grep -l 'ロールバック\\|rollback' {} + 2>/dev/null | head -1 | grep -q . || echo 'SKIP: デプロイ文書なし'"
      level: mandatory
    - name: "監視設定の存在"
      cmd: "find docs -path '*/D-OBS/*' -name '*.md' 2>/dev/null | head -1 | grep -q . || echo 'SKIP: 監視文書なし'"
      level: advisory
  ai:
    - role: devops
      task: |
        G7 安定性ゲート検証:
        デプロイ設定・環境変数・ヘルスチェック・ロールバック手順を検証せよ

G9:
  name: "デプロイ検証ゲート"
  static:
    - name: "リリースノート D-RELNOTE 存在確認"
      cmd: "find docs -path '*/D-RELNOTE/*' -name '*.md' 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "rollback 手順 D-DEPLOY 存在確認"
      cmd: "find docs -path '*/D-DEPLOY/*' -name '*.md' -exec grep -l 'ロールバック\\|rollback' {} + 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "smoke test ログ存在確認"
      cmd: "find docs -path '*/deployment-verification/*' -type f 2>/dev/null | head -1 | grep -q ."
      level: advisory
  ai:
    - role: devops
      task: |
        G9 デプロイ検証ゲート: 本番投入直後 1-4h のスモーク結果、リリースノート整合、rollback 準備、監視開始確認を評価せよ。

G10:
  name: "観測完了ゲート"
  static:
    - name: "observation report 存在確認"
      cmd: "find docs -path '*/observation-report/*' -type f 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "anomaly log 存在確認"
      cmd: "find docs \\( -path '*/anomaly-log/*' -o -path '*/anomaly-logs/*' \\) -type f 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "指標記録率 90% 以上の記録存在確認"
      cmd: "find docs -type f 2>/dev/null -exec grep -lE '指標記録率|metric recording|recording rate|90%|≥ 90|>= 90' {} + | head -1 | grep -q ."
      level: advisory
  ai:
    - role: qa
      task: |
        G10 観測完了ゲート: 観測計画どおりの指標記録率 ≥ 90%、異常検知ログ欠測 0、SLO 逸脱が pass に収束していることを評価。outcome mapping (pass / watch-continue / blocked / failed) のいずれかを判定し、pass 以外なら needs-attention を返せ。watch-continue / blocked / failed では L11 遷移不可。

G11:
  name: "運用学習完了ゲート"
  static:
    - name: "run-learning report 存在確認"
      cmd: "find docs -path '*/run-learning/*' -type f 2>/dev/null | head -1 | grep -q ."
      level: mandatory
    - name: "next-cycle improvement proposal 存在確認"
      cmd: "find docs \\( -path '*/next-cycle-improvement/*' -o -path '*/next-cycle-improvements/*' \\) -type f 2>/dev/null | head -1 | grep -q ."
      level: mandatory
  ai:
    - role: docs
      task: |
        G11 運用学習完了ゲート: incident 主要原因分類 + 再発防止提案完了、次サイクル改善提案 ≥ 1 件、運用学習報告と受入記録の連携更新を評価せよ。
