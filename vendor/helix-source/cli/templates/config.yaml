# helix_template_version: 1
# HELIX プロジェクト設定
# .helix/config.yaml にコピーされる

# ゲートスキップ設定（skip したいゲートを列挙）
gate_skip: []
# 例: gate_skip: [G1.5, G1R, G5]

# スプリントステップスキップ
sprint_skip_steps: []

# AI レビュー無効化（コスト削減用）
ai_review: true

# Codex 実行ガード
codex:
  # true にすると write 実行は helix codex --approved 必須
  require_approved: false
  # true にすると --approved に .helix/approvals/ の承認証跡が必須
  require_approval_evidence: false

# 駆動タイプデフォルト
default_drive: be

# 言語設定
lang: ja
