# action-types.yaml — HELIX アクション型定義
# タスクを構成する最小単位の作業
#
# observe: オブザーバビリティルール
#   expect_keywords: 出力に含まれるべきキーワード（1つ以上マッチで pass）
#   expect_artifact: 生成されるべきファイルパターン
#   expect_exit: 期待する exit code
#   evidence: 作業の証跡として記録するもの

# ============================================================
# 情報収集系
# ============================================================
search-internal:
  name: "内部検索"
  desc: "コードベース・設計書・既存ドキュメント内の検索"
  tool: "Grep, Glob, Read"
  observe:
    expect_keywords: ["grep", "found", "検索", "結果", "件"]
    evidence: "検索クエリと結果件数"

search-external:
  name: "外部検索"
  desc: "Web 検索・先行事例・ライブラリ探索"
  tool: "WebSearch, WebFetch"
  observe:
    expect_keywords: ["http", "github", "npm", "pypi", "ドキュメント", "公式"]
    evidence: "検索クエリとソースURL"

read-docs:
  name: "ドキュメント読解"
  desc: "公式ドキュメント・API リファレンス・仕様書の読解"
  tool: "WebFetch, Read"
  observe:
    expect_keywords: ["Read", "ドキュメント", "仕様", "API", "reference"]
    evidence: "読んだドキュメントのパス or URL"

read-code:
  name: "コード精読"
  desc: "既存コードの構造・ロジック・依存関係の理解"
  tool: "Read, Grep, Glob"
  observe:
    expect_keywords: ["Read", "import", "function", "class", "構造", "依存"]
    evidence: "読んだファイルパス"

# ============================================================
# 検証系
# ============================================================
fact-check:
  name: "ファクトチェック"
  desc: "情報の正確性・最新性・ソースの信頼性を裏取り"
  tool: "WebSearch, WebFetch"
  observe:
    expect_keywords: ["確認", "検証", "裏取り", "ソース", "最新", "CVE", "バージョン"]
    evidence: "検証した事実とソース"

validate-assumption:
  name: "前提検証"
  desc: "暗黙の前提・仮定が正しいか確認"
  tool: "Read, Bash"
  observe:
    expect_keywords: ["確認", "前提", "仮定", "検証", "OK", "pass", "fail"]
    evidence: "検証した前提と結果"

poc:
  name: "PoC 実装"
  desc: "最小限のコードで技術的仮説を検証"
  tool: "Edit, Write, Bash"
  observe:
    expect_keywords: ["Write", "Edit", "実装", "動作", "確認"]
    expect_artifact: "*.ts,*.js,*.py,*.go"
    evidence: "作成したファイルと実行結果"

run-test:
  name: "テスト実行"
  desc: "既存テストスイートの実行・結果確認"
  tool: "Bash"
  observe:
    expect_keywords: ["test", "pass", "fail", "PASS", "FAIL", "テスト", "カバレッジ"]
    expect_exit: 0
    evidence: "テスト結果サマリ"

run-lint:
  name: "静的解析実行"
  desc: "lint / type-check / format check の実行"
  tool: "Bash"
  observe:
    expect_keywords: ["lint", "tsc", "eslint", "ruff", "mypy", "error", "warning", "0 errors"]
    expect_exit: 0
    evidence: "lint 結果"

run-benchmark:
  name: "ベンチマーク実行"
  desc: "パフォーマンス計測・負荷テスト"
  tool: "Bash"
  observe:
    expect_keywords: ["ms", "sec", "ops", "req/s", "latency", "throughput", "計測"]
    evidence: "計測値"

# ============================================================
# 分析・判断系
# ============================================================
analyze:
  name: "分析"
  desc: "情報の比較・評価・分類・優先度付け"
  tool: "Read"
  observe:
    expect_keywords: ["比較", "評価", "メリット", "デメリット", "推奨", "分析", "結果"]
    evidence: "分析結果の要約"

evaluate-risk:
  name: "リスク評価"
  desc: "技術的リスク・セキュリティリスク・運用リスクの評価"
  tool: "Read"
  observe:
    expect_keywords: ["リスク", "影響", "確率", "Critical", "High", "Medium", "Low"]
    evidence: "リスク一覧と評価"

decide:
  name: "判断"
  desc: "選択肢から決定を下す（ADR に記録）"
  tool: "Write"
  observe:
    expect_keywords: ["決定", "採用", "選定", "理由", "ADR"]
    expect_artifact: "docs/adr/*.md,docs/design/*.md"
    evidence: "判断内容と根拠"

estimate:
  name: "見積もり"
  desc: "工数・複雑度・影響範囲の見積もり"
  tool: "Read"
  observe:
    expect_keywords: ["見積", "工数", "日", "時間", "h", "d", "ポイント"]
    evidence: "見積もり値と根拠"

# ============================================================
# 分類・判定系
# ============================================================
classify:
  name: "分類・判定"
  desc: "入力データをカテゴリ・priority・severity に分類"
  tool: "分析 + 判定基準適用"
  observe:
    expect_keywords: ["分類", "判定", "priority", "severity", "classify"]
    evidence: "分類結果と判定根拠"

# ============================================================
# 記述・生成系
# ============================================================
write-doc:
  name: "ドキュメント記述"
  desc: "設計書・ADR・README・仕様書の作成"
  tool: "Write, Edit"
  observe:
    expect_keywords: ["Write", "作成", "記述", "更新"]
    expect_artifact: "*.md"
    evidence: "作成/更新したファイルパス"

write-code:
  name: "コード記述"
  desc: "プロダクションコードの実装"
  tool: "Edit, Write"
  observe:
    expect_keywords: ["Write", "Edit", "実装", "作成"]
    expect_artifact: "*.ts,*.js,*.py,*.go,*.tsx,*.jsx"
    evidence: "変更ファイル一覧"

write-test:
  name: "テスト記述"
  desc: "テストコードの作成"
  tool: "Write, Edit"
  observe:
    expect_keywords: ["test", "describe", "it(", "expect", "assert", "テスト"]
    expect_artifact: "*.test.*,*.spec.*"
    evidence: "テストファイルパス"

write-config:
  name: "設定記述"
  desc: "設定ファイル・環境変数・CI 定義の作成"
  tool: "Write, Edit"
  observe:
    expect_keywords: ["Write", "設定", "config", "env", "yaml", "json"]
    expect_artifact: "*.yaml,*.yml,*.json,*.toml,.env*,Dockerfile,*.config.*"
    evidence: "設定ファイルパス"

write-schema:
  name: "スキーマ記述"
  desc: "DB スキーマ・API スキーマ・型定義の作成"
  tool: "Write, Edit"
  observe:
    expect_keywords: ["schema", "type", "interface", "table", "column", "型", "スキーマ"]
    expect_artifact: "*.ts,*.yaml,*.sql,*.prisma"
    evidence: "スキーマファイルパス"

write-contract:
  name: "契約記述"
  desc: "API コントラクト・インターフェース定義の作成"
  tool: "Write"
  observe:
    expect_keywords: ["contract", "endpoint", "method", "request", "response", "コントラクト"]
    expect_artifact: "*.yaml,*.yml,*.json"
    evidence: "契約ファイルパス"

# ============================================================
# レビュー系
# ============================================================
review-checklist:
  name: "チェックリスト照合"
  desc: "定義済みチェックリストとの突合"
  tool: "Read"
  observe:
    expect_keywords: ["チェック", "確認", "✓", "✗", "pass", "fail", "OK", "NG"]
    evidence: "チェック結果（pass/fail 件数）"

review-visual:
  name: "ビジュアルレビュー"
  desc: "スクリーンショットを目視確認し、デザイン仕様との差異を検出"
  tool: "Read"
  observe:
    expect_keywords: ["スクショ", "screenshot", "desktop", "tablet", "mobile", "配色", "余白", "フォント", "レスポンシブ", "崩れ"]
    expect_artifact: "*.png"
    evidence: "確認したスクショとデザイン指摘"

review-diff:
  name: "差分レビュー"
  desc: "変更差分の確認・指摘"
  tool: "Read, Grep"
  observe:
    expect_keywords: ["diff", "変更", "追加", "削除", "修正", "指摘"]
    evidence: "指摘件数"

review-cross-ref:
  name: "相互参照レビュー"
  desc: "設計書↔実装、契約↔コードの一致確認"
  tool: "Read, Grep"
  observe:
    expect_keywords: ["一致", "不一致", "マッピング", "対応", "網羅", "欠落"]
    evidence: "一致率 or 差分件数"

review-adversarial:
  name: "反証レビュー"
  desc: "意図的に穴を探す・壊す観点でのレビュー"
  tool: "Read"
  observe:
    expect_keywords: ["脆弱", "問題", "リスク", "穴", "攻撃", "障害", "懸念"]
    evidence: "発見した問題数"

# ============================================================
# 操作系
# ============================================================
execute-command:
  name: "コマンド実行"
  desc: "ビルド・デプロイ・マイグレーション等のコマンド実行"
  tool: "Bash"
  observe:
    expect_keywords: ["Bash", "実行", "完了", "success", "done"]
    expect_exit: 0
    evidence: "実行コマンドと結果"

human-confirm:
  name: "人間確認"
  desc: "本番影響・認証・決済・個人情報に関する確認"
  tool: "AskUserQuestion"
  observe:
    expect_keywords: ["確認", "承認", "了解"]
    evidence: "確認内容と結果"

rollback:
  name: "ロールバック"
  desc: "変更の取り消し・前バージョンへの復旧"
  tool: "Bash"
  observe:
    expect_keywords: ["rollback", "復旧", "取り消し", "revert"]
    expect_exit: 0
    evidence: "ロールバック対象と結果"

deploy:
  name: "デプロイ"
  desc: "ステージング/本番へのデプロイ実行"
  tool: "deploy スクリプト"
  observe:
    expect_keywords: ["デプロイ", "deploy", "リリース", "完了"]
    evidence: "デプロイ結果と URL"

# ============================================================
# Learning Engine 系
# ============================================================
learn-from-success:
  name: "成功パターン学習"
  desc: "タスク成功から recipe を自動生成し global.db に同期"
  tool: "helix learn"
  observe:
    expect_keywords: ["recipe", "生成", "学習", "sync"]
    expect_artifact: ".helix/recipes/*.json"

promote-recipe:
  name: "レシピ昇格"
  desc: "成功パターンをスキル/スクリプト/タスクに昇格"
  tool: "helix promote"
  observe:
    expect_keywords: ["昇格", "promote", "生成", "skill"]

discover-pattern:
  name: "パターン検索"
  desc: "グローバル/ローカルから成功パターンを検索"
  tool: "helix discover"
  observe:
    expect_keywords: ["検索", "discover", "候補", "score"]

# ============================================================
# Builder 系
# ============================================================
builder-json-converter:
  name: "JSON変換器ビルド"
  desc: "スキーマ変換パイプライン生成"
  tool: "helix builder json-converter generate"
  observe:
    expect_keywords: ["converter", "json", "変換", "生成"]
    expect_artifact: "builders/json-converters/*.json"
    evidence: "変換定義と変換スクリプト"

builder-verify-script:
  name: "検証スクリプトビルド"
  desc: "verify/*.sh 実行スクリプト生成"
  tool: "helix builder verify-script generate"
  observe:
    expect_keywords: ["verify", "script", "検証", "生成"]
    expect_artifact: "verify/*.sh"
    evidence: "生成スクリプトと構文チェック結果"

builder-agent-loop:
  name: "エージェントループビルド"
  desc: "停止条件付きループ定義生成"
  tool: "helix builder agent-loop generate"
  observe:
    expect_keywords: ["loop", "stop_condition", "反復", "生成"]
    expect_artifact: "builders/loops/*.json"
    evidence: "ループ定義JSON"

builder-task:
  name: "タスクビルド"
  desc: "project-local task-catalog overlay 生成"
  tool: "helix builder task generate"
  observe:
    expect_keywords: ["task", "catalog", "overlay", "生成"]
    expect_artifact: ".helix/task-catalog.yaml"
    evidence: "追記したタスク定義"

builder-workflow:
  name: "ワークフロービルド"
  desc: "DAGベースのworkflow定義生成"
  tool: "helix builder workflow generate"
  observe:
    expect_keywords: ["workflow", "dag", "edge", "生成"]
    expect_artifact: "builders/workflows/*.json"
    evidence: "workflow定義JSONと循環チェック"

builder-agent-pipeline:
  name: "エージェントパイプラインビルド"
  desc: "ステージ連結パイプライン生成"
  tool: "helix builder agent-pipeline generate"
  observe:
    expect_keywords: ["pipeline", "stage", "adapter", "生成"]
    expect_artifact: "builders/pipelines/*.json"
    evidence: "pipeline定義JSONと契約チェック"

builder-agent-skill:
  name: "エージェントスキルビルド"
  desc: "SKILL.md フォーマットでスキル生成"
  tool: "helix builder agent-skill generate"
  observe:
    expect_keywords: ["skill", "frontmatter", "markdown", "生成"]
    expect_artifact: "skills/generated/*/SKILL.md"
    evidence: "生成SKILL.mdとfrontmatter検証"

builder-sub-agent:
  name: "サブエージェントビルド"
  desc: "サブエージェント定義生成"
  tool: "helix builder sub-agent generate"
  observe:
    expect_keywords: ["sub-agent", "execution", "context", "生成"]
    expect_artifact: "builders/sub-agents/*.json"
    evidence: "サブエージェント定義JSON"
